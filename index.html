<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌گر جامع سئو و تحلیل‌گر عبارات فارسی</title>
    <style>
        :root {
            --bg-main: #fcfbf9;
            --bg-surface: #ffffff;
            --bg-neutral-light: #f1f0ec;
            --border-subtle: #e4e2dd;
            --border-active: #f97316;
            --text-heading: #1c1917;
            --text-body: #44403c;
            --text-muted: #78716c;
            --primary: #f97316;
            --primary-hover: #ea580c;
            --accent: #b45309;
            --accent-bg: #fef3c7;
            --error: #dc2626;
            --radius-lg: 14px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 1.5rem 1rem;
            direction: rtl;
            min-height: 100vh;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-heading);
            margin: 0 0 0.5rem 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-heading);
            margin: 2.5rem 0 1.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 1.25rem;
            background-color: var(--primary);
            border-radius: var(--radius-sm);
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px -2px rgba(28, 25, 23, 0.03);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 0.25rem;
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-heading);
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        input[type="url"] { direction: ltr; font-family: monospace; }
        textarea { direction: ltr; font-family: monospace; height: 110px; resize: none; }

        .btn-stack { display: flex; gap: 1rem; flex-wrap: wrap; }

        button {
            flex: 1;
            min-width: 180px;
            background-color: var(--primary);
            color: #ffffff;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--bg-neutral-light); color: var(--text-muted); cursor: not-allowed; }

        .status-bar {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            background-color: var(--accent-bg);
            border: 1px solid rgba(180, 83, 9, 0.15);
            color: var(--accent);
            text-align: center;
            display: none;
        }

        .scroll-container {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            background-color: var(--bg-surface);
            margin-bottom: 2rem;
            -webkit-overflow-scrolling: touch;
        }

        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 1200px;
            table-layout: fixed;
        }

        .comparison-table th, .comparison-table td {
            padding: 1rem;
            border: 1px solid var(--border-subtle);
            vertical-align: top;
            text-align: right;
            word-wrap: break-word;
        }

        .comparison-table th.metric-header, 
        .comparison-table td.metric-header {
            position: sticky;
            right: 0;
            background-color: var(--bg-neutral-light);
            color: var(--text-heading);
            font-weight: 700;
            width: 180px;
            z-index: 2;
            border-left: 2px solid var(--border-subtle);
        }

        .comparison-table th.url-column-header {
            background-color: var(--bg-main);
            color: var(--text-heading);
            font-weight: 700;
        }

        .table-responsive { width: 100%; margin: 1rem 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; background-color: var(--bg-surface); }
        th { background-color: var(--bg-main); color: var(--text-heading); font-weight: 700; padding: 0.85rem 1rem; border-bottom: 2px solid var(--border-subtle); }
        td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border-subtle); }

        ul { margin: 0; padding-right: 1.1rem; }
        li { margin-bottom: 0.25rem; }
        a { color: var(--primary); text-decoration: none; }

        .flex-tables { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .flex-tables { grid-template-columns: repeat(2, 1fr); } }

        .phrase-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            padding: 0.4rem 0.6rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }
        
        .count-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            background-color: var(--accent-bg);
            padding: 0.1rem 0.4rem;
            border-radius: var(--radius-sm);
        }

        .body-preview-box {
            background-color: var(--bg-main);
            border: 1px dashed var(--border-subtle);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-line;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</h1>
        <p class="subtitle">نسخه کالیبره شده با فیلتر حذف تکرار تگ‌ها و کنترل فواصل معنایی جملات</p>
    </header>
    
    <div class="card">
        <div class="dashboard-grid">
            <div class="control-group">
                <label>بخش اول: استخراج خودکار آدرس‌ها (تا ۵ آدرس همزمان)</label>
                <input type="url" class="url-input" placeholder="https://example1.com" value="https://kayhanravan.ir/arshad/clinical-general-psychology/">
                <input type="url" class="url-input" placeholder="https://example2.com">
                <input type="url" class="url-input" placeholder="https://example3.com">
                <input type="url" class="url-input" placeholder="https://example4.com">
                <input type="url" class="url-input" placeholder="https://example5.com">
            </div>

            <div class="control-group">
                <label>بخش دوم: کدهای سورس دستی HTML (تا ۲ سورس همزمان)</label>
                <textarea class="html-input" placeholder="سورس کد اول را اینجا پیست کنید..."></textarea>
                <textarea class="html-input" style="margin-top: 0.5rem;" placeholder="سورس کد دوم را اینجا پیست کنید..."></textarea>
            </div>
        </div>

        <div class="btn-stack">
            <button id="start-btn" onclick="triggerUnifiedExtractionWorkflow()">شروع پردازش کالیبره شده</button>
        </div>
        
        <div id="status-output" class="status-bar"></div>
    </div>

    <div id="comparison-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.style.display = "block";
        statusDiv.innerText = `در حال خزش از سرور ${i + 1} (${proxy.name})...`;
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error();
            const text = await response.text();
            if (text && text.trim().length > 200) return text;
        } catch (e) {}
    }
    throw new Error();
}

async function triggerUnifiedExtractionWorkflow() {
    const urlInputs = document.querySelectorAll('.url-input');
    const htmlInputs = document.querySelectorAll('.html-input');
    const startBtn = document.getElementById('start-btn');
    const statusDiv = document.getElementById('status-output');
    const comparisonSection = document.getElementById('comparison-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    comparisonSection.innerHTML = "<h2>جدول مقایسه همزمان ساختار سئو و محتوای ورودی‌ها</h2>";
    phraseResultsSection.innerHTML = "<h2>جداول تحلیل عبارات کلیدی تکرار شونده فارسی (مجموع کل ورودی‌ها)</h2>";
    
    let allExtractedTexts = [];
    let perSourcePhrases = {}; 
    let parsedSourcesData = [];

    const activeUrls = Array.from(urlInputs).map(i => i.value.trim()).filter(url => url !== "");
    const activeHtmlTexts = Array.from(htmlInputs).map(i => i.value.trim()).filter(text => text !== "");

    if (activeUrls.length === 0 && activeHtmlTexts.length === 0) {
        alert("خطا: ورودی یافت نشد.");
        return;
    }

    startBtn.disabled = true;
    statusDiv.style.display = "block";

    if (activeUrls.length > 0) {
        for (let url of activeUrls) {
            try {
                const htmlText = await fetchWithProxyFallback(url, statusDiv);
                const data = extractHtmlMetrics(url, htmlText, allExtractedTexts, perSourcePhrases);
                parsedSourcesData.push(data);
            } catch (error) {
                parsedSourcesData.push({ label: url, isError: true });
            }
        }
    }

    if (activeHtmlTexts.length > 0) {
        activeHtmlTexts.forEach((htmlData, index) => {
            const label = `سورس دستی شماره ${index + 1}`;
            const data = extractHtmlMetrics(label, htmlData, allExtractedTexts, perSourcePhrases);
            parsedSourcesData.push(data);
        });
    }

    if (parsedSourcesData.length > 0) {
        renderUnifiedComparisonMatrix(parsedSourcesData, comparisonSection);
        const combinedGlobalText = allExtractedTexts.join(" [BREAK] ");
        renderGlobalPhraseTables(combinedGlobalText, phraseResultsSection);
        renderPerUrlPhraseTable(perSourcePhrases, phraseResultsSection);
        statusDiv.innerText = "تحلیل بدون تکرار و کالیبره شده با موفقیت به پایان رسید!";
    }
    
    startBtn.disabled = false;
}

function extractHtmlMetrics(label, htmlContent, allExtractedTexts, perSourcePhrases) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    const title = doc.querySelector('title')?.innerText || "";
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "";
    const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim()).filter(t => t !== "");
    const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim()).filter(t => t !== "");
    const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim()).filter(t => t !== "");
    const altTexts = Array.from(doc.querySelectorAll('img')).map(img => img.getAttribute('alt')).filter(alt => alt && alt.trim() !== "");
    const anchorTexts = Array.from(doc.querySelectorAll('a')).map(el => el.innerText.trim()).filter(t => t !== "");

    // Clean Document Structure for counting to prevent overlapping sentences
    const cleanDoc = doc.cloneNode(true);
    
    // Completely remove non-contextual blocks to prevent side-bar and menu pollution
    const block elements = cleanDoc.querySelectorAll('script, style, svg, iframe, nav, header, footer, noscript, head, dialog, sidebar, .menu, .sidebar, #footer, #header');
    block elements.forEach(el => el.remove());

    // Inject a special separator placeholder before paragraph breaks, list elements, or headers 
    // to preserve visual text isolation and stop phrases from cross-merging
    cleanDoc.querySelectorAll('p, div, li, h1, h2, h3, tr, section, article').forEach(el => {
        el.insertAdjacentText('beforeend', ' [BREAK] ');
    });

    const pureBodyText = cleanDoc.body ? cleanDoc.body.innerText : "";

    // K-GRAM BALANCER ENGINE:
    // We strictly use ONLY the structured title/headings and the body string. 
    // Anchor elements are already nested in the body innerText naturally, so we NO LONGER append arrays.
    const textSnapshotForCounting = `${title} [BREAK] ${metaDesc} [BREAK] ${h1s.join(" ")} [BREAK] ${pureBodyText}`;
    
    allExtractedTexts.push(textSnapshotForCounting);
    perSourcePhrases[label] = textSnapshotForCounting;

    return {
        label, isError: false, title, metaDesc, h1s, h2s, h3s, altTexts, anchorTexts, pureBodyText: pureBodyText.replace(/\[BREAK\]/g, '\n').replace(/\s+/g, ' ').trim()
    };
}

function renderUnifiedComparisonMatrix(sources, container) {
    const scrollWrapper = document.createElement('div');
    scrollWrapper.className = 'scroll-container';

    let tableHtml = `<table class="comparison-table"><thead><tr><th class="metric-header">شاخص‌های ساختاری سئو</th>`;
    sources.forEach(src => {
        tableHtml += `<th class="url-column-header" style="direction: ltr; text-align: left;">${src.label}</th>`;
    });
    tableHtml += `</tr></thead><tbody>`;

    const metrics = [
        { id: 'title', label: 'Title (عنوان صفحه)' },
        { id: 'metaDesc', label: 'Meta Description' },
        { id: 'h1s', label: 'تگ‌های H1' },
        { id: 'h2s', label: 'تگ‌های H2' },
        { id: 'h3s', label: 'تگ‌های H3' },
        { id: 'altTexts', label: 'متن تصاویر (Alt)' },
        { id: 'anchorTexts', label: 'متن لینک‌ها (Anchor Text)' },
        { id: 'pureBodyText', label: 'متن خالص بدنه (محتوای متنی)' }
    ];

    metrics.forEach(metric => {
        tableHtml += `<tr><td class="metric-header">${metric.label}</td>`;
        sources.forEach(src => {
            if (src.isError) {
                tableHtml += `<td style="color:var(--error)">عدم دسترسی به منبع اطلاعاتی!</td>`;
                return;
            }
            let cell = "";
            if (metric.id === 'title') cell = src.title ? `<strong>${src.title}</strong>` : '---';
            else if (metric.id === 'metaDesc') cell = src.metaDesc || '---';
            else if (['h1s', 'h2s', 'h3s', 'altTexts'].includes(metric.id)) {
                cell = src[metric.id].length ? `<ul>${src[metric.id].map(i => `<li>${i}</li>`).join('')}</ul>` : '---';
            } else if (metric.id === 'anchorTexts') {
                const uniq = [...new Set(src.anchorTexts)];
                cell = src.anchorTexts.length ? `<span class="count-badge">کل: ${src.anchorTexts.length}</span><div style="max-height:100px; overflow-y:auto; font-size:0.8rem; margin-top:0.4rem;"><ul>${uniq.slice(0,60).map(i => `<li>${i}</li>`).join('')}</ul></div>` : '---';
            } else if (metric.id === 'pureBodyText') {
                const words = src.pureBodyText.split(' ').filter(w => w.length > 0);
                cell = words.length ? `<span class="count-badge">کل: ${words.length} کلمه</span><div class="body-preview-box">${words.slice(0, 100).join(' ')}...</div>` : '---';
            }
            tableHtml += `<td>${cell}</td>`;
        });
        tableHtml += `</tr>`;
    });

    tableHtml += `</tbody></table>`;
    scrollWrapper.innerHTML = tableHtml;
    container.appendChild(scrollWrapper);
}

function getTopPhrases(text, phraseLength, topCount = 10) {
    // Split structural groups first using our custom block-breaks
    const paragraphs = text.split('[BREAK]');
    const phraseCounts = {};
    const stopWords = ['از', 'به', 'که', 'در', 'با', 'تا', 'را', 'این', 'آن', 'است', 'برای', 'می', 'شور', 'شد', 'شود', 'هم', 'یک', 'یا', 'ها', 'دارد', 'دهند', 'کنند', 'ال', 'های', 'بود', 'دارند', 'نیز', 'وی', 'شدند', 'دارید', 'کنند'];
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;

    paragraphs.forEach(p => {
        const foundWords = p.match(persianRegex);
        if (!foundWords) return;

        // Strip localized stop-words safely per textual element segment
        const words = foundWords.filter(word => !stopWords.includes(word) && word.length > 1);
        if (words.length < phraseLength) return;

        // Slide window ONLY within the limits of this single structural element block
        for (let i = 0; i <= words.length - phraseLength; i++) {
            const phrase = words.slice(i, i + phraseLength).join(" ");
            phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
        }
    });

    return Object.entries(phraseCounts).sort((a, b) => b[1] - a[1]).slice(0, topCount);
}

function renderGlobalPhraseTables(globalText, container) {
    const flexContainer = document.createElement('div');
    flexContainer.className = 'flex-tables';
    for (let len = 2; len <= 5; len++) {
        const topPhrases = getTopPhrases(globalText, len, 10);
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <h4 style="margin-top:0; border-bottom:1px solid var(--border-subtle); padding-bottom:0.5rem; font-size:0.9rem;">ترکیبات ${len} کلمه‌ای برتر (شمارش کالیبره شده)</h4>
            <div class="table-responsive">
                <table>
                    <tbody>
                        ${topPhrases.map(([phrase, count]) => `
                            <tr><td><strong>${phrase}</strong></td><td style="text-align:center; width:30%;"><span class="count-badge">${count} بار</span></td></tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        flexContainer.appendChild(div);
    }
    container.appendChild(flexContainer);
}

function formatTopTwoPhrases(text, phraseLen) {
    const topTwo = getTopPhrases(text, phraseLen, 2);
    if (topTwo.length === 0) return '<span style="color:var(--text-muted)">---</span>';
    return topTwo.map(([phrase, count]) => `
        <div class="phrase-item"><span style="color:var(--text-heading); font-weight:500;">${phrase}</span><span class="count-badge">${count} بار</span></div>
    `).join('');
}

function renderPerUrlPhraseTable(perSourcePhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3 style="margin-bottom:0.5rem;">جدول نهایی سئو: تفکیک دو کلمه کلیدی برتر هر ورودی (بدون تکرار تگ‌ها)</h3>`;
    let tableHtml = `<div class="table-responsive"><table><thead><tr><th style="direction:ltr; text-align:left; width:22%">منبع ورودی</th><th>تکرار ۲ کلمه‌ای</th><th>تکرار ۳ کلمه‌ای</th><th>تکرار ۴ کلمه‌ای</th><th>تکرار ۵ کلمه‌ای</th></tr></thead><tbody>`;

    for (const [sourceLabel, text] of Object.entries(perSourcePhrases)) {
        tableHtml += `
            <tr>
                <td style="direction:ltr; text-align:left; font-size:0.8rem; color:var(--text-muted); word-break:break-all;">${sourceLabel.startsWith('http') ? `<small>${sourceLabel}</small>` : sourceLabel}</td>
                <td>${formatTopTwoPhrases(text, 2)}</td>
                <td>${formatTopTwoPhrases(text, 3)}</td>
                <td>${formatTopTwoPhrases(text, 4)}</td>
                <td>${formatTopTwoPhrases(text, 5)}</td>
            </tr>
        `;
    }
    tableHtml += `</tbody></table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}
</script>
</body>
</html>
