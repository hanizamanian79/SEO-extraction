<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌گر جامع سئو (ماتریس مقایسه ستونی)</title>
    <style>
        :root {
            --bg-main: #fcfbf9;
            --bg-surface: #ffffff;
            --bg-neutral-light: #f1f0ec;
            --border-subtle: #e4e2dd;
            --border-active: #f97316;
            
            --text-heading: #1c1917;
            --text-body: #44403c;
            --text-muted: #78716c;
            
            --primary: #f97316;
            --primary-hover: #ea580c;
            --accent: #b45309;
            --accent-bg: #fef3c7;
            --error: #dc2626;
            
            --radius-lg: 14px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 1.5rem 1rem;
            direction: rtl;
            min-height: 100vh;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1600px; /* Expanded for mega dynamic layouts */
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-heading);
            margin: 0 0 0.5rem 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-heading);
            margin: 2.5rem 0 1.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 1.25rem;
            background-color: var(--primary);
            border-radius: var(--radius-sm);
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px -2px rgba(28, 25, 23, 0.03);
        }

        .seo-tag {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
            margin-right: 0.25rem;
            font-family: monospace;
            vertical-align: middle;
        }
        .seo-tag.t { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .seo-tag.h1 { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .seo-tag.md { background-color: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-heading);
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-heading);
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        input[type="url"] { direction: ltr; font-family: monospace; }
        textarea { direction: ltr; font-family: monospace; height: 110px; resize: none; }

        .btn-stack { display: flex; gap: 1rem; }

        button {
            flex: 1;
            background-color: var(--primary);
            color: #ffffff;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--bg-neutral-light); color: var(--text-muted); cursor: not-allowed; }

        .status-bar {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            background-color: var(--accent-bg);
            border: 1px solid rgba(180, 83, 9, 0.15);
            color: var(--accent);
            text-align: center;
            display: none;
        }

        /* ---------------------------------------------------- */
        /* Mega Column Matrix Table (Horizontal Scroll System)   */
        /* ---------------------------------------------------- */
        .mega-table-wrapper {
            width: 100%;
            overflow-x: auto; /* Forces native horizontal scroll handling */
            margin: 1rem 0;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 20px -2px rgba(28, 25, 23, 0.03);
        }

        /* Prevent system from squeezing columns. 
           Allows tables to grow dynamically based on number of extracted entries */
        .mega-table-wrapper table {
            width: 100%;
            min-width: 1000px; 
            border-collapse: collapse;
            font-size: 0.85rem;
            table-layout: fixed; /* Strict column boundaries */
        }

        .mega-table-wrapper th, .mega-table-wrapper td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-subtle);
            border-left: 1px solid var(--border-subtle);
            vertical-align: top;
            text-align: right;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .mega-table-wrapper th:last-child, .mega-table-wrapper td:last-child {
            border-left: none;
        }

        /* Fixing labels for standard features column */
        .mega-table-wrapper td.feature-label {
            background-color: var(--bg-main);
            color: var(--text-heading);
            font-weight: bold;
            text-align: center;
            vertical-align: middle;
            width: 180px; 
            position: sticky;
            right: 0; /* Keeps structural parameters frozen while sliding inputs */
            box-shadow: 2px 0 5px rgba(0,0,0,0.02);
            z-index: 2;
        }

        .mega-table-wrapper th.feature-corner {
            background-color: var(--bg-neutral-light);
            width: 180px;
            position: sticky;
            right: 0;
            z-index: 3;
        }

        .mega-table-wrapper th.source-column-header {
            background-color: var(--bg-main);
            color: var(--text-heading);
            font-weight: 800;
            text-align: center;
            font-size: 0.9rem;
        }

        .phrase-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            padding: 0.3rem 0.5rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.35rem;
            font-size: 0.8rem;
        }
        
        .phrase-wrapper { display: flex; align-items: center; flex-wrap: wrap; gap: 0.2rem; }
        .phrase-text { color: var(--text-heading); font-weight: 500; }
        .count-badge { font-size: 0.7rem; font-weight: 700; color: var(--accent); background-color: var(--accent-bg); padding: 0.05rem 0.3rem; border-radius: var(--radius-sm); white-space: nowrap; }
        
        .anchor-preview-box { 
            background-color: var(--bg-main); 
            border: 1px solid var(--border-subtle); 
            padding: 0.6rem; 
            border-radius: var(--radius-md); 
            max-height: 200px; 
            overflow-y: auto; 
            font-size: 0.8rem; 
            color: var(--accent);
            line-height: 1.8;
        }
        
        .body-preview-box { background-color: var(--bg-main); border: 1px dashed var(--border-subtle); padding: 0.6rem; border-radius: var(--radius-md); max-height: 150px; overflow-y: auto; white-space: pre-line; font-size: 0.8rem; }
        
        .filter-notice {
            font-size: 0.8rem;
            color: var(--text-muted);
            background-color: var(--bg-neutral-light);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
        }

        ul { margin: 0; padding-right: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</h1>
        <p class="subtitle">سیستم پایش فرکانس سئو همراه با تگ‌های موقعیت هوشمند و فیلتر خودکار عبارات تکراری پیش‌فرض فروشگاهی</p>
    </header>
    
    <div class="card">
        <div class="filter-notice">
            <strong>صافی هوشمند فعال است:</strong> کلمات عمومی فروشگاهی مانند «هزار، تومان، محصول، سبد خرید، افزودن به سبد خرید» به طور خودکار از محاسبات چگالی حذف خواهند شد.
        </div>

        <div class="dashboard-grid">
            <div class="control-group">
                <label>بخش اول: استخراج خودکار آدرس‌ها (تا ۵ آدرس همزمان)</label>
                <input type="url" class="url-input" placeholder="https://example1.com" value="https://kayhanravan.ir/arshad/clinical-general-psychology/">
                <input type="url" class="url-input" placeholder="https://example2.com">
                <input type="url" class="url-input" placeholder="https://example3.com">
                <input type="url" class="url-input" placeholder="https://example4.com">
                <input type="url" class="url-input" placeholder="https://example5.com">
            </div>

            <div class="control-group">
                <label>بخش دوم: کدهای سورس دستی HTML (تا ۲ سورس همزمان)</label>
                <textarea class="html-input" placeholder="سورس کد اول را اینجا پیست کنید..."></textarea>
                <textarea class="html-input" style="margin-top: 0.5rem;" placeholder="سورس کد دوم را اینجا پیست کنید..."></textarea>
            </div>
        </div>

        <div class="btn-stack">
            <button id="start-btn" onclick="triggerUnifiedExtractionWorkflow()">شروع پردازش و تحلیل همزمان کل داده‌ها</button>
        </div>
        
        <div id="status-output" class="status-bar"></div>
    </div>

    <div id="url-matrix-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
const STOP_WORDS = ["هزار", "تومان", "محصول", "سبد", "خرید", "افزودن"];

let seoContextData = { titles: [], h1s: [], descriptions: [] };
let parsedSourcesMemory = []; // Explicit chronological data storage for rendering custom column-based tables

async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.style.display = "block";
        statusDiv.innerText = `در حال خزش آدرس از طریق سرور شبکه ${i + 1} (${proxy.name})...`;
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error("Blocked");
            const text = await response.text();
            if (text && text.trim().length > 200) return text;
        } catch (e) {
            console.warn(`${proxy.name} bypassed.`);
        }
    }
    throw new Error("Blocked");
}

async function triggerUnifiedExtractionWorkflow() {
    const urlInputs = document.querySelectorAll('.url-input');
    const htmlInputs = document.querySelectorAll('.html-input');
    const startBtn = document.getElementById('start-btn');
    const statusDiv = document.getElementById('status-output');
    const urlMatrixSection = document.getElementById('url-matrix-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    urlMatrixSection.innerHTML = "";
    phraseResultsSection.innerHTML = ""; 
    
    seoContextData = { titles: [], h1s: [], descriptions: [] };
    parsedSourcesMemory = []; 
    let perSourcePhrases = {}; 

    const activeUrls = Array.from(urlInputs).map(i => i.value.trim()).filter(url => url !== "");
    const activeHtmlTexts = Array.from(htmlInputs).map(i => i.value.trim()).filter(text => text !== "");

    if (activeUrls.length === 0 && activeHtmlTexts.length === 0) {
        alert("خطا: هیچ آدرس اینترنتی یا سورس کدی برای پردازش وارد نشده است.");
        return;
    }

    startBtn.disabled = true;
    statusDiv.style.display = "block";

    if (activeUrls.length > 0) {
        for (let url of activeUrls) {
            try {
                const htmlText = await fetchWithProxyFallback(url, statusDiv);
                processHtmlDocument(url, htmlText, perSourcePhrases);
            } catch (error) {
                parsedSourcesMemory.push({ label: url, error: true });
            }
        }
    }

    if (activeHtmlTexts.length > 0) {
        activeHtmlTexts.forEach((htmlData, index) => {
            statusDiv.innerText = `در حال استخراج داده‌های متنی سورس دستی شماره ${index + 1}...`;
            const label = `سورس دستی وارد شده شماره ${index + 1}`;
            processHtmlDocument(label, htmlData, perSourcePhrases);
        });
    }

    if (parsedSourcesMemory.length > 0) {
        statusDiv.innerText = "در حال ایجاد جدول مقایسه‌ای ماتریسی خطی...";
        renderMegaMatrixTable(urlMatrixSection);
        
        statusDiv.innerText = "در حال فرآوری و متراژ آماری کل عبارات کلیدی به ازای هر ورودی...";
        renderPerUrlPhraseTable(perSourcePhrases, phraseResultsSection);
        
        statusDiv.innerText = "عملیات ارزیابی با موفقیت به پایان رسید!";
    } else {
        statusDiv.innerText = "تحلیل ناموفق بود: هیچ متنی یافت نشد.";
    }
    startBtn.disabled = false;
}

function processHtmlDocument(label, htmlContent, perSourcePhrases) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    const title = doc.querySelector('title')?.innerText || "";
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "";
    const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim());
    const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim());
    const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim());
    const altTexts = Array.from(doc.querySelectorAll('img')).map(img => img.getAttribute('alt')).filter(alt => alt && alt.trim() !== "").map(alt => alt.trim());
    const anchorTexts = Array.from(doc.querySelectorAll('a')).map(el => el.innerText.trim()).filter(text => text !== "");

    const cleanDoc = doc.cloneNode(true);
    const elementsToRemove = cleanDoc.querySelectorAll('script, style, svg, path, iframe, nav, header, footer, noscript, link, head, dialog');
    elementsToRemove.forEach(el => el.remove());
    const pureBodyText = cleanDoc.body ? cleanDoc.body.innerText.replace(/\s+/g, ' ').trim() : "";

    if (title) seoContextData.titles.push(title.toLowerCase());
    if (metaDesc) seoContextData.descriptions.push(metaDesc.toLowerCase());
    h1s.forEach(h1 => seoContextData.h1s.push(h1.toLowerCase()));

    const combinedLinkElementsText = `
        ${title} \n ${metaDesc} \n ${h1s.join(" \n ")} \n ${h2s.join(" \n ")} \n ${h3s.join(" \n ")} \n 
        ${anchorTexts.join(" \n ")} \n ${altTexts.join(" \n ")} \n ${pureBodyText}
    `;
    
    perSourcePhrases[label] = combinedLinkElementsText; 

    // Commit elements directly to object memory bank
    parsedSourcesMemory.push({
        label, title, metaDesc, h1s, h2s, h3s, altTexts, anchorTexts, pureBodyText, error: false
    });
}

function renderMegaMatrixTable(container) {
    const sectionTitle = document.createElement('h2');
    sectionTitle.innerText = "ماتریس ستونی و مقایسه جامع پارامترهای تشخیصی هر ورودی";
    container.appendChild(sectionTitle);

    const outerWrapper = document.createElement('div');
    outerWrapper.className = 'mega-table-wrapper';

    // Calculate dynamic column width depending on count size to maintain pristine UX
    const calculatedColWidth = parsedSourcesMemory.length > 2 ? '380px' : '450px';

    let html = `<table><thead><tr><th class="feature-corner">پارامتر سئو / آدرس</th>`;
    
    // Header Generation Pass
    parsedSourcesMemory.forEach(source => {
        const dynamicLink = source.label.startsWith('http') 
            ? `<a href="${source.label}" target="_blank" style="direction:ltr; display:block; font-size:0.75rem; color:var(--primary); word-break:break-all;">${source.label}</a>` 
            : `<span>${source.label}</span>`;
        html += `<th class="source-column-header" style="width: ${calculatedColWidth};">${dynamicLink}</th>`;
    });
    html += `</tr></thead><tbody>`;

    // Row definitions matrix mapping configuration loop 
    const fields = [
        { id: 'title', label: 'Title (عنوان صفحه)' },
        { id: 'metaDesc', label: 'Meta Description' },
        { id: 'h1s', label: 'عناوین H1' },
        { id: 'h2s', label: 'عناوین H2' },
        { id: 'h3s', label: 'عناوین H3' },
        { id: 'anchors', label: 'متن انکرتکست‌ها (خط به خط)' },
        { id: 'alts', label: 'متن تصاویر (Alt)' },
        { id: 'body', label: 'متن استخراج‌شده از بدنه' }
    ];

    fields.forEach(field => {
        html += `<tr><td class="feature-label">${field.label}</td>`;
        
        parsedSourcesMemory.forEach(source => {
            if (source.error) {
                html += `<td style="color:var(--error); text-align:center; background-color:rgba(220,38,38,0.02)">خطا در دسترسی به این منبع</td>`;
                return;
            }

            html += `<td>`;
            switch(field.id) {
                case 'title':
                    html += `<span style="color:var(--text-heading); font-weight:600;">${source.title || 'موجود نیست'}</span>`;
                    break;
                case 'metaDesc':
                    html += `<span>${source.metaDesc || 'موجود نیست'}</span>`;
                    break;
                case 'h1s':
                    html += source.h1s.length ? `<ul>${source.h1s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد';
                    break;
                case 'h2s':
                    html += source.h2s.length ? `<ul>${source.h2s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد';
                    break;
                case 'h3s':
                    html += source.h3s.length ? `<ul>${source.h3s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد';
                    break;
                case 'anchors':
                    html += source.anchorTexts.length 
                        ? `<div class="anchor-preview-box">${source.anchorTexts.map(text => `<div>🔗 ${text}</div>`).join('')}</div>` 
                        : 'یافت نشد';
                    break;
                case 'alts':
                    html += source.altTexts.length ? `<ul>${source.altTexts.map(a => `<li>${a}</li>`).join('')}</ul>` : 'یافت نشد';
                    break;
                case 'body':
                    const wordsArray = source.pureBodyText.split(' ').filter(w => w.length > 0);
                    const previewText = wordsArray.slice(0, 140).join(' ') + (wordsArray.length > 140 ? ' ...' : '');
                    html += `<div class="body-preview-box">${previewText || 'هیچ متنی یافت نشد'}</div>`;
                    break;
            }
            html += `</td>`;
        });
        html += `</tr>`;
    });

    html += `</tbody></table>`;
    outerWrapper.innerHTML = html;
    container.appendChild(outerWrapper);
}

function getTopPhrases(text, phraseLength, topCount = 10) {
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;
    const foundWords = text.match(persianRegex);
    if (!foundWords) return [];

    const words = foundWords.filter(word => {
        const cleanWord = word.trim();
        return cleanWord.length > 1 && !STOP_WORDS.includes(cleanWord);
    });

    const phraseCounts = {};
    for (let i = 0; i <= words.length - phraseLength; i++) {
        const phrase = words.slice(i, i + phraseLength).join(" ");
        phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
    }
    return Object.entries(phraseCounts).sort((a, b) => b[1] - a[1]).slice(0, topCount);
}

function generateSeoBadges(phrase) {
    let badgesHtml = "";
    const lowerPhrase = phrase.toLowerCase();
    
    const inTitle = seoContextData.titles.some(t => t.includes(lowerPhrase));
    const inH1 = seoContextData.h1s.some(h => h.includes(lowerPhrase));
    const inDesc = seoContextData.descriptions.some(d => d.includes(lowerPhrase));

    if (inTitle) badgesHtml += `<span class="seo-tag t">T</span>`;
    if (inH1) badgesHtml += `<span class="seo-tag h1">H1</span>`;
    if (inDesc) badgesHtml += `<span class="seo-tag md">MD</span>`;
    
    return badgesHtml;
}

function formatTopTwelvePhrases(text, phraseLen) {
    const topTwelve = getTopPhrases(text, phraseLen, 12);
    if (topTwelve.length === 0) return '<span style="color:var(--text-muted)">یافت نشد</span>';
    
    return topTwelve.map(([phrase, count]) => `
        <div class="phrase-item">
            <div class="phrase-wrapper">
                <span class="phrase-text">${phrase}</span>
                ${generateSeoBadges(phrase)}
            </div>
            <span class="count-badge">${count} بار</span>
        </div>
    `).join('');
}

function renderPerUrlPhraseTable(perSourcePhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h2>جدول تفکیک دوازده عبارت کلیدی برتر به ازای هر ورودی اطلاعات</h2>`;
    
    let tableHtml = `
        <div class="table-responsive">
            <table id="per-url-table-dom">
                <thead>
                    <tr>
                        <th style="direction:ltr; text-align:left; width: 16%">منبع ورودی اطلاعات</th>
                        <th>عبارات ۲ کلمه‌ای</th>
                        <th>عبارات ۳ کلمه‌ای</th>
                        <th>عبارات ۴ کلمه‌ای</th>
                        <th>عبارات ۵ کلمه‌ای</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (const [sourceLabel, text] of Object.entries(perSourcePhrases)) {
        const cellP2 = formatTopTwelvePhrases(text, 2);
        const cellP3 = formatTopTwelvePhrases(text, 3);
        const cellP4 = formatTopTwelvePhrases(text, 4);
        const cellP5 = formatTopTwelvePhrases(text, 5);

        const isUrl = sourceLabel.startsWith('http');
        const stylizedLabel = isUrl ? `<small>${sourceLabel}</small>` : `<span>${sourceLabel}</span>`;

        tableHtml += `
            <tr>
                <td style="direction:ltr; text-align:left; word-break: break-all; font-size: 0.8rem; padding-top:1rem;">${stylizedLabel}</td>
                <td>${cellP2}</td>
                <td>${cellP3}</td>
                <td>${cellP4}</td>
                <td>${cellP5}</td>
            </tr>
        `;
    }

    tableHtml += `</tbody></table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}
</script>
</body>
</html>
