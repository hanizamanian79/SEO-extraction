<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</title>
    <style>
        :root {
            /* Premium Chalk & Light Slate Minimalist Palette */
            --bg-main: #fcfbf9;           /* Soft Linen Cream Chalk White */
            --bg-surface: #ffffff;        /* Crisp White Elements */
            --bg-neutral-light: #f1f0ec;  /* Balanced Warm Gray for tables/inputs */
            --border-subtle: #e4e2dd;     /* Low-contrast organic border lines */
            --border-active: #f97316;     /* Vivid Safety Orange Accent */
            
            /* High Contrast Neutral Typography */
            --text-heading: #1c1917;      /* Deep Charcoal Black */
            --text-body: #44403c;         /* Soft Dark Stone Gray */
            --text-muted: #78716c;        /* Muted Taupe Gray */
            
            /* Accent Signifiers */
            --primary: #f97316;           /* Crisp Modern Orange */
            --primary-hover: #ea580c;     /* Burned Orange */
            --accent: #b45309;            /* Deep Amber / Gold Accent for metrics */
            --accent-bg: #fef3c7;         /* Soft Cream Amber Fill */
            --error: #dc2626;             /* Velvet Crimson */
            
            --radius-lg: 14px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition-smooth: all 0.2s ease-in-out;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 1.5rem 1rem;
            direction: rtl;
            min-height: 100vh;
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--text-heading);
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.01em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        h2 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-heading);
            margin: 2.5rem 0 1.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 1.25rem;
            background-color: var(--primary);
            border-radius: var(--radius-sm);
        }

        h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-heading);
            margin: 0 0 1rem 0;
        }

        /* Minimalist Modern Cards */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px -2px rgba(28, 25, 23, 0.03);
        }

        /* Two Column Dynamic Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-heading);
            margin-bottom: 0.25rem;
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-heading);
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: var(--transition-smooth);
        }

        input[type="url"] { direction: ltr; font-family: monospace; }
        textarea { direction: ltr; font-family: monospace; height: 110px; resize: none; }

        input[type="url"]:focus, textarea:focus {
            outline: none;
            border-color: var(--border-active);
            background-color: var(--bg-surface);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        /* Action Buttons */
        .btn-stack {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 180px;
            background-color: var(--primary);
            color: #ffffff;
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--bg-neutral-light);
            color: var(--text-muted);
            cursor: not-allowed;
            border: 1px solid var(--border-subtle);
        }

        /* Status Feedback Area */
        .status-bar {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            background-color: var(--accent-bg);
            border: 1px solid rgba(180, 83, 9, 0.15);
            color: var(--accent);
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            display: none;
        }

        /* Advanced Responsive Layout Framework */
        .table-responsive {
            width: 100%;
            margin: 1rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            background-color: var(--bg-surface);
        }

        th {
            background-color: var(--bg-main);
            color: var(--text-heading);
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.85rem 1rem;
            border-bottom: 2px solid var(--border-subtle);
        }

        td {
            padding: 0.85rem 1rem;
            text-align: right;
            border-bottom: 1px solid var(--border-subtle);
            vertical-align: top;
        }

        ul { margin: 0; padding-right: 1.1rem; padding-left: 0; }
        li { margin-bottom: 0.25rem; }
        
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .flex-tables {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .flex-tables { grid-template-columns: repeat(2, 1fr); }
        }

        /* Micro Phrase Design Badges */
        .phrase-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            padding: 0.4rem 0.6rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            gap: 1rem;
        }
        
        .phrase-text {
            color: var(--text-heading);
            font-weight: 500;
        }
        
        .count-badge {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            background-color: var(--accent-bg);
            padding: 0.1rem 0.4rem;
            border-radius: var(--radius-sm);
        }

        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Responsive Mobile Layout Layer */
        @media screen and (max-width: 768px) {
            .table-responsive table, 
            .table-responsive tbody, 
            .table-responsive tr, 
            .table-responsive td { 
                display: block; 
                width: 100%; 
            }
            
            .table-responsive thead { 
                display: none; 
            }

            .table-responsive tr {
                background: var(--bg-surface);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-md);
                margin-bottom: 1rem;
                padding: 0.75rem;
            }

            .table-responsive td {
                text-align: right;
                border-bottom: 1px dashed var(--border-subtle);
                padding: 0.5rem 0;
            }

            .table-responsive td:last-child {
                border-bottom: none;
            }

            .table-responsive td::before {
                content: attr(data-label);
                display: block;
                font-size: 0.75rem;
                font-weight: 700;
                color: var(--text-muted);
                margin-bottom: 0.2rem;
                text-transform: uppercase;
            }

            #per-url-table-dom tbody tr {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                border: 1px solid var(--border-subtle);
                background-color: var(--bg-surface);
                padding: 1rem;
                margin-bottom: 1.5rem;
                border-radius: var(--radius-lg);
            }

            #per-url-table-dom td {
                border: none;
                padding: 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</h1>
        <p class="subtitle">سیستم پایش و متراژ کلمات کلیدی، برچسب‌های هیدینگ و تصاویر به تفکیک دامنه و سورس متنی</p>
    </header>
    
    <!-- Unified App Control Panel -->
    <div class="card">
        <div class="dashboard-grid">
            <div class="control-group">
                <label>بخش اول: استخراج خودکار آدرس‌ها (تا ۵ آدرس همزمان)</label>
                <input type="url" class="url-input" placeholder="https://example1.com" value="https://kayhanravan.ir/arshad/clinical-general-psychology/">
                <input type="url" class="url-input" placeholder="https://example2.com">
                <input type="url" class="url-input" placeholder="https://example3.com">
                <input type="url" class="url-input" placeholder="https://example4.com">
                <input type="url" class="url-input" placeholder="https://example5.com">
            </div>

            <div class="control-group">
                <label>بخش دوم: کدهای سورس دستی HTML (تا ۲ سورس همزمان)</label>
                <textarea class="html-input" placeholder="سورس کد اول (View Page Source) را اینجا پیست کنید..."></textarea>
                <textarea class="html-input" style="margin-top: 0.5rem;" placeholder="سورس کد دوم (View Page Source) را اینجا پیست کنید..."></textarea>
            </div>
        </div>

        <div class="btn-stack">
            <button id="start-btn" onclick="triggerUnifiedExtractionWorkflow()">شروع پردازش و تحلیل همزمان کل داده‌ها</button>
        </div>
        
        <div id="status-output" class="status-bar"></div>
    </div>

    <!-- Output Sections -->
    <div id="url-results-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" },
        { name: "AllOrigins (JSON Wrapped)", url: `https://api.allorigins.win/get?url=${encodedUrl}`, type: "json" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.style.display = "block";
        statusDiv.innerText = `در حال خزش آدرس از طریق سرور شبکه ${i + 1} (${proxy.name})...`;
        
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error("Blocked");
            if (proxy.type === "json") {
                const json = await response.json();
                if (json.contents) return json.contents;
            } else {
                const text = await response.text();
                if (text && text.trim().length > 200) return text;
            }
        } catch (e) {
            console.warn(`${proxy.name} bypassed.`);
        }
    }
    throw new Error("Blocked");
}

async function triggerUnifiedExtractionWorkflow() {
    const urlInputs = document.querySelectorAll('.url-input');
    const htmlInputs = document.querySelectorAll('.html-input');
    const startBtn = document.getElementById('start-btn');
    const statusDiv = document.getElementById('status-output');
    const urlResultsSection = document.getElementById('url-results-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    urlResultsSection.innerHTML = "<h2>جزئیات تشخیصی ساختار تفکیکی هر ورودی</h2>";
    phraseResultsSection.innerHTML = "<h2>جداول تحلیل عبارات کلیدی تکرار شونده فارسی (مجموع کل ورودی‌ها)</h2>";
    
    let allExtractedTexts = [];
    let perSourcePhrases = {}; 

    const activeUrls = Array.from(urlInputs).map(i => i.value.trim()).filter(url => url !== "");
    const activeHtmlTexts = Array.from(htmlInputs).map(i => i.value.trim()).filter(text => text !== "");

    if (activeUrls.length === 0 && activeHtmlTexts.length === 0) {
        alert("خطا: هیچ آدرس اینترنتی یا سورس کدی برای پردازش وارد نشده است.");
        return;
    }

    startBtn.disabled = true;
    statusDiv.style.display = "block";

    if (activeUrls.length > 0) {
        for (let url of activeUrls) {
            try {
                const htmlText = await fetchWithProxyFallback(url, statusDiv);
                processHtmlDocument(url, htmlText, allExtractedTexts, perSourcePhrases, urlResultsSection);
            } catch (error) {
                renderErrorTable(url, urlResultsSection);
            }
        }
    }

    if (activeHtmlTexts.length > 0) {
        activeHtmlTexts.forEach((htmlData, index) => {
            statusDiv.innerText = `در حال استخراج داده‌های متنی سورس دستی شماره ${index + 1}...`;
            processHtmlDocument(`سورس دستی وارد شده شماره ${index + 1}`, htmlData, allExtractedTexts, perSourcePhrases, urlResultsSection);
        });
    }

    if (allExtractedTexts.length > 0) {
        statusDiv.innerText = "در حال فرآوری و متراژ آماری کل عبارات کلیدی به صورت یکپارچه...";
        const combinedGlobalText = allExtractedTexts.join(" ");
        
        renderGlobalPhraseTables(combinedGlobalText, phraseResultsSection);
        renderPerUrlPhraseTable(perSourcePhrases, phraseResultsSection);
        
        statusDiv.innerText = "عملیات ارزیابی ترکیبی با موفقیت به پایان رسید!";
    } else {
        statusDiv.innerText = "تحلیل ناموفق بود: هیچ متنی یافت نشد.";
    }
    
    startBtn.disabled = false;
}

function processHtmlDocument(label, htmlContent, allExtractedTexts, perSourcePhrases, container) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    // Metadata
    const title = doc.querySelector('title')?.innerText || "موجود نیست";
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "موجود نیست";
    
    const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim());
    const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim());
    const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim());
    const altTexts = Array.from(doc.querySelectorAll('img')).map(img => img.getAttribute('alt')).filter(alt => alt && alt.trim() !== "").map(alt => alt.trim());

    // --- مکانیزم امن و قطعی برای استخراج ۱۰۰٪ متن بدنه اصلی صفحه ---
    // شبیه‌سازی کلون سند برای دستکاری امن در حافظه بدون تخریب خروجی ساختاری
    const cleanDoc = doc.cloneNode(true);
    
    // حذف فوری و کامل کدهای برنامه‌نویسی، تگ‌های سربرگ و بخش‌های ناوبری عمومی برای جلوگیری از آلودگی آماری
    const elementsToRemove = cleanDoc.querySelectorAll('script, style, svg, path, iframe, nav, header, footer, noscript, link, head');
    elementsToRemove.forEach(el => el.remove());

    // اکنون متغیر کل متن بدنه، شامل ۱۰۰٪ کلمات بخش‌های محتوایی، سوالات متداول و کامنت‌ها است
    const pureBodyText = cleanDoc.body ? cleanDoc.body.innerText : "";

    // ادغام متن خالص کل بدنه به همراه توصیف تصاویر (Alt) برای پردازش آماری
    const totalUnifiedText = `${pureBodyText} ${altTexts.join(" ")}`;
    
    allExtractedTexts.push(totalUnifiedText);
    perSourcePhrases[label] = totalUnifiedText;

    // رندر کارت‌های ساختاری سئو
    renderUrlTable(label, title, metaDesc, h1s, h2s, h3s, altTexts, container);
}

function renderUrlTable(url, title, desc, h1s, h2s, h3s, altTexts, container) {
    const card = document.createElement('div');
    card.className = 'card';
    const dynamicLink = url.startsWith('http') ? `<a href="${url}" target="_blank" style="direction:ltr; display:inline-block;">${url}</a>` : url;
    card.innerHTML = `
        <h3 style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 0.5rem; font-size:1rem; word-break: break-all;">منبع ورودی: ${dynamicLink}</h3>
        <div class="table-responsive">
            <table>
                <tbody>
                    <tr><td style="width:25%" data-label="شاخص سئو"><strong>Title (عنوان صفحه)</strong></td><td data-label="محتوا" style="color:var(--text-heading); font-weight:600;">${title}</td></tr>
                    <tr><td data-label="شاخص سئو"><strong>Meta Description</strong></td><td data-label="محتوا">${desc}</td></tr>
                    <tr><td data-label="شاخص سئو"><strong>عناوین H1</strong></td><td data-label="محتوا">${h1s.length ? `<ul>${h1s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>'}</td></tr>
                    <tr><td data-label="شاخص سئو"><strong>عناوین H2</strong></td><td data-label="محتوا">${h2s.length ? `<ul>${h2s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>'}</td></tr>
                    <tr><td data-label="شاخص سئو"><strong>عناوین H3</strong></td><td data-label="محتوا">${h3s.length ? `<ul>${h3s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>'}</td></tr>
                    <tr><td data-label="شاخص سئو"><strong>متن تصاویر (Alt)</strong></td><td data-label="محتوا">${altTexts.length ? `<ul>${altTexts.map(a => `<li>${a}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">تصویری با ویژگی alt یافت نشد</span>'}</td></tr>
                </tbody>
            </table>
        </div>
    `;
    container.appendChild(card);
}

function renderErrorTable(url, container) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <h3 style="font-size:1rem; color:var(--error);">عدم دسترسی به آدرس: ${url}</h3>
        <p class="error-msg">سرورهای امنیتی مبدا اتصال خزش مستقیم را مسدود کردند. راهکار قطعی: کدهای این صفحه را کپی کرده و در یکی از باکس‌های بخش دوم (سورس دستی HTML) پیست کنید تا همراه بقیه صفحات ارزیابی شود.</p>
    `;
    container.appendChild(card);
}

function getTopPhrases(text, phraseLength, topCount = 10) {
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;
    const foundWords = text.match(persianRegex);
    if (!foundWords) return [];

    const stopWords = ['از', 'به', 'که', 'در', 'با', 'تا', 'را', 'این', 'آن', 'است', 'برای', 'می', 'شور', 'شد', 'شود', 'هم', 'یک', 'یا', 'ها', 'دارد', 'دهند', 'کنند', 'ال', 'های', 'بود', 'دارند', 'نیز', 'تا', 'وی', 'شدند'];
    const words = foundWords.filter(word => !stopWords.includes(word) && word.length > 1);

    const phraseCounts = {};
    for (let i = 0; i <= words.length - phraseLength; i++) {
        const phrase = words.slice(i, i + phraseLength).join(" ");
        phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
    }

    return Object.entries(phraseCounts).sort((a, b) => b[1] - a[1]).slice(0, topCount);
}

function renderGlobalPhraseTables(globalText, container) {
    const flexContainer = document.createElement('div');
    flexContainer.className = 'flex-tables';
    
    for (let len = 2; len <= 5; len++) {
        const topPhrases = getTopPhrases(globalText, len, 10);
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <h4 style="margin-top:0; border-bottom: 1px solid var(--border-subtle); padding-bottom:0.5rem; color:var(--text-heading); font-size:0.95rem;">برترین ترکیبات ${len} کلمه‌ای مجموع آدرس‌ها و کدهای دستی</h4>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr><th>عبارت فارسی</th><th style="width:35%; text-align:center;">فرکانس تکرار</th></tr>
                    </thead>
                    <tbody>
                        ${topPhrases.map(([phrase, count]) => `
                            <tr>
                                <td data-label="عبارت"><strong>${phrase}</strong></td>
                                <td data-label="تکرار" style="text-align:center;"><span class="count-badge">${count} بار</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        flexContainer.appendChild(div);
    }
    container.appendChild(flexContainer);
}

function formatTopTwoPhrases(text, phraseLen) {
    const topTwo = getTopPhrases(text, phraseLen, 2);
    if (topTwo.length === 0) return '<span style="color:var(--text-muted)">یافت نشد</span>';
    
    return topTwo.map(([phrase, count]) => `
        <div class="phrase-item">
            <span class="phrase-text">${phrase}</span>
            <span class="count-badge">${count} بار</span>
        </div>
    `).join('');
}

function renderPerUrlPhraseTable(perSourcePhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<h3 style="margin-bottom:1rem;">جدول نهایی: تفکیک دو کلمه کلیدی برتر به ازای هر تک ورودی (لینک یا متن دستی)</h3>`;
    
    let tableHtml = `
        <div class="table-responsive">
            <table id="per-url-table-dom">
                <thead>
                    <tr>
                        <th style="direction:ltr; text-align:left; width: 25%">منبع ورودی اطلاعات</th>
                        <th>عبارات ۲ کلمه‌ای</th>
                        <th>عبارات ۳ کلمه‌ای</th>
                        <th>عبارات ۴ کلمه‌ای</th>
                        <th>عبارات ۵ کلمه‌ای</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (const [sourceLabel, text] of Object.entries(perSourcePhrases)) {
        const cellP2 = formatTopTwoPhrases(text, 2);
        const cellP3 = formatTopTwoPhrases(text, 3);
        const cellP4 = formatTopTwoPhrases(text, 4);
        const cellP5 = formatTopTwoPhrases(text, 5);

        const isUrl = sourceLabel.startsWith('http');
        const stylizedLabel = isUrl ? `<small>${sourceLabel}</small>` : `<span>${sourceLabel}</span>`;

        tableHtml += `
            <tr>
                <td data-label="منبع / آدرس" style="direction:ltr; text-align:left; word-break: break-all; color: var(--text-muted); font-size: 0.8rem; font-weight:500;">${stylizedLabel}</td>
                <td data-label="برترین‌های ۲ کلمه‌ای">${cellP2}</td>
                <td data-label="برترین‌های ۳ کلمه‌ای">${cellP3}</td>
                <td data-label="برترین‌های ۴ کلمه‌ای">${cellP4}</td>
                <td data-label="برترین‌های ۵ کلمه‌ای">${cellP5}</td>
            </tr>
        `;
    }

    tableHtml += `</tbody></table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}
</script>
</body>
</html>
