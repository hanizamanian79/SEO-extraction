<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --error: #ef4444;
            --table-header: rgba(15, 23, 42, 0.6);
            --table-row-hover: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 1rem;
            direction: rtl;
            min-height: 100vh;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 0;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to left, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h2 {
            font-size: 1.4rem;
            color: var(--text-main);
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            border-right: 4px solid var(--primary);
            padding-right: 0.5rem;
        }

        h3 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 1rem;
        }

        h4 {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: transform 0.2s ease;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input[type="url"] {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            direction: ltr;
            transition: all 0.2s ease;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        button:disabled { 
            background-color: #475569; 
            color: #94a3b8;
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }

        .status {
            font-weight: 500;
            margin-top: 1.25rem;
            color: #fbbf24;
            text-align: center;
            font-size: 0.95rem;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin: 1rem 0;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(22, 30, 49, 0.8);
            font-size: 0.9rem;
            min-width: 500px;
        }

        th, td {
            padding: 0.9rem 1.2rem;
            text-align: right;
            border-bottom: 1px solid var(--card-border);
            line-height: 1.5;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: var(--table-row-hover);
        }

        ul { 
            margin: 0; 
            padding-right: 1.2rem; 
            padding-left: 0; 
        }

        li {
            margin-bottom: 0.25rem;
        }
        
        a {
            color: #818cf8;
            text-decoration: none;
            transition: color 0.2s;
        }
        a:hover { color: #a5b4fc; text-decoration: underline; }

        .flex-tables {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .flex-tables {
                grid-template-columns: repeat(2, 1fr);
            }
            button {
                width: auto;
            }
        }

        .error-msg {
            color: var(--error);
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</h1>
    
    <div class="card">
        <h3>آدرس ۵ سایت مورد نظر را وارد کنید:</h3>
        <div class="input-group">
            <input type="url" class="url-input" placeholder="https://example.com" value="https://www.heyvagroup.com/shownews/109/%DA%AF%D8%B1%D8%A7%DB%8C%D8%B4-%D9%87%D8%A7%DB%8C-%DA%A9%D8%A7%D8%B1%D8%B4%D9%86%D8%A7%D8%B3%DB%8C-%D8%A7%D8%B1%D8%B4%D8%AF-%D8%B1%D8%B4%D8%AA%D9%87-%D8%B1%D9%88%D8%A7%D9%86%D8%B4%D9%86%D8%A7%D8%B3%DB%8C.html">
            <input type="url" class="url-input" placeholder="https://another-example.com">
            <input type="url" class="url-input" placeholder="">
            <input type="url" class="url-input" placeholder="">
            <input type="url" class="url-input" placeholder="">
        </div>
        <button id="start-btn" onclick="startExtracting()">شروع استخراج اطلاعات</button>
        <div id="status-output" class="status"></div>
    </div>

    <div id="url-results-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" },
        { name: "AllOrigins (JSON Wrapped)", url: `https://api.allorigins.win/get?url=${encodedUrl}`, type: "json" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.innerText = `در حال تلاش از طریق سرور کمکی ${i + 1} (${proxy.name})...`;
        
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error("Blocked or failed status");

            if (proxy.type === "json") {
                const json = await response.json();
                if (json.contents) return json.contents;
            } else {
                const text = await response.text();
                if (text && text.trim().length > 200) return text;
            }
        } catch (e) {
            console.warn(`${proxy.name} failed or was blocked. Trying next fallback...`);
        }
    }
    throw new Error("All proxies were blocked by the website's firewall.");
}

async function startExtracting() {
    const inputs = document.querySelectorAll('.url-input');
    const startBtn = document.getElementById('start-btn');
    const statusDiv = document.getElementById('status-output');
    const urlResultsSection = document.getElementById('url-results-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    urlResultsSection.innerHTML = "<h2>جزئیات سئو هر آدرس</h2>";
    phraseResultsSection.innerHTML = "<h2>تحلیل عبارات تکراری فارسی</h2>";
    
    const urls = Array.from(inputs).map(i => i.value.trim()).filter(url => url !== "");
    
    if (urls.length === 0) {
        alert("لطفاً حداقل یک آدرس معتبر وارد کنید.");
        return;
    }

    startBtn.disabled = true;
    let allExtractedTexts = [];
    let perUrlPhrases = {}; 

    for (let url of urls) {
        try {
            const htmlText = await fetchWithProxyFallback(url, statusDiv);
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, "text/html");

            const title = doc.querySelector('title')?.innerText || "N/A";
            const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "N/A";
            
            const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim());
            const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim());
            const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim());

            const bodyText = doc.body ? doc.body.innerText : "";
            allExtractedTexts.push(bodyText);
            perUrlPhrases[url] = bodyText;

            renderUrlTable(url, title, metaDesc, h1s, h2s, h3s, urlResultsSection);

        } catch (error) {
            console.error(error);
            renderErrorTable(url, urlResultsSection);
        }
    }

    statusDiv.innerText = "در حال تحلیل و استخراج کلمات فارسی...";
    
    const combinedGlobalText = allExtractedTexts.join(" ");
    renderGlobalPhraseTables(combinedGlobalText, phraseResultsSection);
    renderPerUrlPhraseTable(perUrlPhrases, phraseResultsSection);

    statusDiv.innerText = "عملیات با موفقیت پایان یافت!";
    startBtn.disabled = false;
}

function renderUrlTable(url, title, desc, h1s, h2s, h3s, container) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <h3>اطلاعات سایت: <a href="${url}" target="_blank" style="direction:ltr; display:inline-block;">${url}</a></h3>
        <div class="table-responsive">
            <table>
                <tr><th style="width: 25%">آیتم سئو</th><th>محتوای استخراج شده</th></tr>
                <tr><td><strong>Title (عنوان صفحه)</strong></td><td>${title}</td></tr>
                <tr><td><strong>Meta Description (توضیحات)</strong></td><td>${desc}</td></tr>
                <tr><td><strong>تگ‌های H1</strong></td><td>${h1s.length ? `<ul>${h1s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
                <tr><td><strong>تگ‌های H2</strong></td><td>${h2s.length ? `<ul>${h2s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
                <tr><td><strong>تگ‌های H3</strong></td><td>${h3s.length ? `<ul>${h3s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
            </table>
        </div>
    `;
    container.appendChild(card);
}

function renderErrorTable(url, container) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <h3>خطا در آدرس: <a href="${url}" target="_blank" style="direction:ltr; display:inline-block;">${url}</a></h3>
        <p class="error-msg">سیستم‌های امنیتی و فایروال این وب‌سایت مانع از دسترسی ربات‌های واسطه شدند. برای تحلیل این نوع دامنه‌های سخت‌گیر، نیاز به سرور پروکسی اختصاصی دارید.</p>
    `;
    container.appendChild(card);
}

// Fixed function target parameter up to 10 entries instead of 5
function getTopPhrases(text, phraseLength, topCount = 10) {
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;
    const foundWords = text.match(persianRegex);
    
    if (!foundWords) return [];

    const stopWords = ['از', 'به', 'که', 'در', 'با', 'تا', 'را', 'این', 'آن', 'است', 'برای', 'می', 'شور', 'شد', 'شود', 'هم', 'یک', 'یا', 'ها', 'دارد', 'دهند'];
    const words = foundWords.filter(word => !stopWords.includes(word) && word.length > 1);

    const phraseCounts = {};
    
    for (let i = 0; i <= words.length - phraseLength; i++) {
        const phrase = words.slice(i, i + phraseLength).join(" ");
        phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
    }

    return Object.entries(phraseCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, topCount);
}

function renderGlobalPhraseTables(globalText, container) {
    const flexContainer = document.createElement('div');
    flexContainer.className = 'flex-tables';
    
    for (let len = 2; len <= 5; len++) {
        // Will fetch top 10 rows
        const topPhrases = getTopPhrases(globalText, len, 10);
        const div = document.createElement('div');
        div.className = 'card';
        div.style.marginBottom = '0';
        div.innerHTML = `
            <h4>برترین عبارات ${len} کلمه‌ای (کل سایت‌ها)</h4>
            <div class="table-responsive">
                <table>
                    <tr><th>عبارت فارسی</th><th style="width: 30%">تعداد تکرار</th></tr>
                    ${topPhrases.map(([phrase, count]) => `<tr><td><strong>${phrase}</strong></td><td>${count}</td></tr>`).join('')}
                </table>
            </div>
        `;
        flexContainer.appendChild(div);
    }
    container.appendChild(flexContainer);
}

function renderPerUrlPhraseTable(perUrlPhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginTop = '2rem';
    div.innerHTML = `<h3>جدول ۴.۵: برترین عبارات پرتکرار به تفکیک هر آدرس</h3>`;
    
    let tableHtml = `
        <div class="table-responsive">
            <table>
                <tr>
                    <th style="direction:ltr; text-align:left; min-width:200px;">URL</th>
                    <th>برترین عبارت ۲ کلمه‌ای</th>
                    <th>برترین عبارت ۳ کلمه‌ای</th>
                    <th>برترین عبارت ۴ کلمه‌ای</th>
                    <th>برترین عبارت ۵ کلمه‌ای</th>
                </tr>
    `;

    for (const [url, text] of Object.entries(perUrlPhrases)) {
        const p2 = getTopPhrases(text, 2, 1)[0]?.[0] || 'یافت نشد';
        const p3 = getTopPhrases(text, 3, 1)[0]?.[0] || 'یافت نشد';
        const p4 = getTopPhrases(text, 4, 1)[0]?.[0] || 'یافت نشد';
        const p5 = getTopPhrases(text, 5, 1)[0]?.[0] || 'یافت نشد';

        tableHtml += `
            <tr>
                <td style="direction:ltr; text-align:left;"><small>${url}</small></td>
                <td><span style="color:var(--accent); font-weight:600;">${p2}</span></td>
                <td><span style="color:var(--accent); font-weight:600;">${p3}</span></td>
                <td><span style="color:var(--accent); font-weight:600;">${p4}</span></td>
                <td><span style="color:var(--accent); font-weight:600;">${p5}</span></td>
            </tr>
        `;
    }

    tableHtml += `</table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}
</script>
</body>
</html>
