<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد پیشرفته و ماتریسی آنالیز سئو</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-surface: #ffffff;
            --bg-neutral-light: #f1f5f9;
            --border-subtle: #e2e8f0;
            --border-active: #6366f1;
            
            --text-heading: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent-emerald: #059669;
            --accent-emerald-bg: #ecfdf5;
            --accent-amber: #d97706;
            --accent-amber-bg: #fef3c7;
            --error: #ef4444;
            
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Tahoma, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-body);
            margin: 0;
            padding: 2rem 1.5rem;
            direction: rtl;
            min-height: 100vh;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1650px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text-heading);
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.025em;
            background: linear-gradient(to left, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin: 0;
        }

        h2 {
            font-size: 1.45rem;
            font-weight: 800;
            color: var(--text-heading);
            margin: 3rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        h2::before {
            content: '';
            width: 6px;
            height: 1.5rem;
            background-color: var(--primary);
            border-radius: var(--radius-sm);
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            transition: var(--transition-smooth);
        }

        .seo-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.15rem 0.4rem;
            border-radius: var(--radius-sm);
            margin-right: 0.35rem;
            font-family: monospace;
            vertical-align: middle;
        }
        .seo-tag.t { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .seo-tag.h1 { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .seo-tag.md { background-color: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 992px) {
            .dashboard-grid { grid-template-columns: 1.2fr 1fr; }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-heading);
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 0.85rem 1.1rem;
            background-color: var(--bg-neutral-light);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            color: var(--text-heading);
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: var(--transition-smooth);
        }

        input[type="url"]:focus, textarea:focus {
            background-color: var(--bg-surface);
            border-color: var(--border-active);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        input[type="url"] { direction: ltr; font-family: monospace; }
        textarea { direction: ltr; font-family: monospace; height: 135px; resize: none; }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: #ffffff;
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.05rem;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
            transition: var(--transition-smooth);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            background: linear-gradient(135deg, var(--primary-hover), var(--primary));
        }
        
        button:active { transform: translateY(0); }
        button:disabled { background: var(--border-subtle); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }

        button.excel-btn {
            background: linear-gradient(135deg, #107c41, #1f9a55);
            box-shadow: 0 4px 14px rgba(16, 124, 65, 0.3);
        }
        button.excel-btn:hover {
            background: linear-gradient(135deg, #0e6b37, #107c41);
            box-shadow: 0 6px 20px rgba(16, 124, 65, 0.4);
        }

        .status-bar {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: var(--radius-md);
            background-color: var(--accent-amber-bg);
            border: 1px solid rgba(217, 119, 6, 0.2);
            color: var(--accent-amber);
            text-align: center;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .top-scrollbar-container {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            height: 18px;
            margin-bottom: -1.5rem;
            position: relative;
            z-index: 15;
        }
        .top-scrollbar-fake-content {
            height: 1px;
        }

        .mega-table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin: 1.5rem 0;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            position: relative;
        }

        .mega-table-wrapper table {
            width: 100%;
            min-width: 1100px; 
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.9rem;
            table-layout: fixed;
        }

        .mega-table-wrapper th, .mega-table-wrapper td {
            padding: 1.1rem 1.2rem;
            border-bottom: 1px solid var(--border-subtle);
            border-left: 1px solid var(--border-subtle);
            vertical-align: top;
            text-align: right;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .mega-table-wrapper th:last-child, .mega-table-wrapper td:last-child {
            border-left: none;
        }

        .mega-table-wrapper td.feature-label {
            background-color: #f8fafc;
            color: var(--text-heading);
            font-weight: 800;
            text-align: center;
            vertical-align: middle;
            width: 190px; 
            position: sticky;
            right: 0;
            box-shadow: -4px 0 10px rgba(15, 23, 42, 0.04);
            z-index: 10;
            border-left: 2px solid var(--border-subtle);
        }

        .mega-table-wrapper th.feature-corner {
            background-color: #e2e8f0;
            color: var(--text-heading);
            font-weight: 900;
            width: 190px;
            position: sticky;
            right: 0;
            top: 0;
            z-index: 12;
            text-align: center;
            border-left: 2px solid var(--border-subtle);
        }

        .mega-table-wrapper th.source-column-header {
            background-color: #f1f5f9;
            color: var(--text-heading);
            font-weight: 800;
            text-align: center;
            font-size: 0.9rem;
            position: sticky;
            top: 0;
            z-index: 8;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .mega-table-wrapper tr:hover td {
            background-color: rgba(248, 250, 252, 0.7);
        }
        
        .mega-table-wrapper tr:hover td.feature-label {
            background-color: #f1f5f9;
        }

        .phrase-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--bg-main);
            border: 1px solid var(--border-subtle);
            padding: 0.45rem 0.75rem;
            border-radius: var(--radius-sm);
            margin-bottom: 0.45rem;
            font-size: 0.85rem;
            transition: var(--transition-smooth);
        }
        
        .phrase-item:hover {
            border-color: var(--border-active);
            background-color: #fff;
            transform: translateX(-2px);
        }
        
        .phrase-wrapper { display: flex; align-items: center; flex-wrap: wrap; gap: 0.3rem; }
        .phrase-text { color: var(--text-heading); font-weight: 600; }
        .count-badge { font-size: 0.75rem; font-weight: 700; color: var(--accent-emerald); background-color: var(--accent-emerald-bg); padding: 0.1rem 0.4rem; border-radius: var(--radius-sm); white-space: nowrap; }
        
        .anchor-preview-box { 
            background-color: #fafafa; 
            border: 1px solid var(--border-subtle); 
            padding: 0.85rem; 
            border-radius: var(--radius-md); 
            max-height: 220px; 
            overflow-y: auto; 
            font-size: 0.85rem; 
            color: #3b82f6;
            line-height: 1.9;
        }
        
        .anchor-preview-line {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.15rem 0;
            border-bottom: 1px dashed #f1f5f9;
        }
        .anchor-preview-line:last-child { border-bottom: none; }
        
        .body-preview-box { 
            background-color: var(--bg-main); 
            border: 1px dashed var(--border-subtle); 
            padding: 0.85rem; 
            border-radius: var(--radius-md); 
            max-height: 160px; 
            overflow-y: auto; 
            white-space: pre-line; 
            font-size: 0.85rem; 
            color: var(--text-muted);
        }
        
        .filter-notice {
            font-size: 0.85rem;
            color: #1e293b;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .table-responsive { width: 100%; margin: 1rem 0; }
        .table-responsive table { width: 100%; border-collapse: collapse; }
        .table-responsive th { background-color: #f8fafc; color: var(--text-heading); padding: 1rem; border-bottom: 2px solid var(--border-subtle); }
        .table-responsive td { padding: 1rem; border-bottom: 1px solid var(--border-subtle); }

        ul { margin: 0; padding-right: 1.2rem; }
        li { margin-bottom: 0.25rem; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>استخراج‌گر و ماتریس آنالیز سئوی رقبا</h1>
        <p class="subtitle">سیستم پایش دقیق فرکانس و متراژ کلمات کلیدی همگام با معماری ساختاری یکپارچه</p>
    </header>
    
    <div class="card">
        <div class="filter-notice">
            <span style="font-size: 1.2rem;">✨</span>
            <span><strong>صافی هوشمند زنده:</strong> کلمات عمومی فروشگاهی مانند «هزار، تومان، محصول، سبد خرید، افزودن» به‌طور خودکار از نتایج چگالی فیلتر می‌شوند.</span>
        </div>

        <div class="dashboard-grid">
            <div class="control-group">
                <label>خزش خودکار صفحات وب (تا ۵ آدرس همزمان)</label>
                <input type="url" class="url-input" placeholder="https://example1.com">
                <input type="url" class="url-input" placeholder="https://example2.com">
                <input type="url" class="url-input" placeholder="https://example3.com">
                <input type="url" class="url-input" placeholder="https://example4.com">
                <input type="url" class="url-input" placeholder="https://example5.com">
            </div>

            <div class="control-group">
                <label>تزریق مستقیم سورس کدهای HTML (تا ۲ منبع تعاملی)</label>
                <textarea class="html-input" placeholder="کدهای سورس مورد نظر را اینجا پیست کنید..."></textarea>
                <textarea class="html-input" style="margin-top: 0.5rem;" placeholder="کدهای سورس دوم را اینجا پیست کنید..."></textarea>
            </div>
        </div>

        <div class="action-buttons">
            <button id="start-btn" onclick="triggerUnifiedExtractionWorkflow()">شروع پردازش و رندر ماتریس سئو</button>
            <button id="export-btn" class="excel-btn" onclick="exportDataToExcel()" disabled>📥 دانلود خروجی اکسل پیشرفته</button>
        </div>
        <div id="status-output" class="status-bar"></div>
    </div>

    <div id="url-matrix-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
const STOP_WORDS = ["هزار", "تومان", "محصول", "سبد", "خرید", "افزودن"];

let parsedSourcesMemory = [];
let globalPerSourcePhrases = {}; 

async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.style.display = "block";
        statusDiv.innerText = `🔄 در حال خزش آدرس از طریق شبکه امن ${i + 1} (${proxy.name})...`;
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error("Blocked");
            const text = await response.text();
            if (text && text.trim().length > 200) return text;
        } catch (e) {
            console.warn(`${proxy.name} bypassed.`);
        }
    }
    throw new Error("Blocked");
}

async function triggerUnifiedExtractionWorkflow() {
    const urlInputs = document.querySelectorAll('.url-input');
    const htmlInputs = document.querySelectorAll('.html-input');
    const startBtn = document.getElementById('start-btn');
    const exportBtn = document.getElementById('export-btn');
    const statusDiv = document.getElementById('status-output');
    const urlMatrixSection = document.getElementById('url-matrix-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    urlMatrixSection.innerHTML = "";
    phraseResultsSection.innerHTML = ""; 
    exportBtn.disabled = true;
    
    parsedSourcesMemory = []; 
    globalPerSourcePhrases = {}; 

    const activeUrls = Array.from(urlInputs).map(i => i.value.trim()).filter(url => url !== "");
    const activeHtmlTexts = Array.from(htmlInputs).map(i => i.value.trim()).filter(text => text !== "");

    if (activeUrls.length === 0 && activeHtmlTexts.length === 0) {
        alert("لطفا ابتدا حداقل یک آدرس یا یک سورس کد برای تحلیل وارد کنید.");
        return;
    }

    startBtn.disabled = true;
    statusDiv.style.display = "block";

    if (activeUrls.length > 0) {
        for (let url of activeUrls) {
            try {
                const htmlText = await fetchWithProxyFallback(url, statusDiv);
                processHtmlDocument(url, htmlText, globalPerSourcePhrases);
            } catch (error) {
                parsedSourcesMemory.push({ label: url, error: true });
            }
        }
    }

    if (activeHtmlTexts.length > 0) {
        activeHtmlTexts.forEach((htmlData, index) => {
            statusDiv.innerText = `⚙️ فرآوری کدهای ساختاری سورس دستی شماره ${index + 1}...`;
            const label = `سورس دستی شماره ${index + 1}`;
            processHtmlDocument(label, htmlData, globalPerSourcePhrases);
        });
    }

    if (parsedSourcesMemory.length > 0) {
        statusDiv.innerText = "⚡ در حال رندر و زیباسازی ماتریس بزرگ مقایسه‌ای...";
        renderMegaMatrixTable(urlMatrixSection);
        
        statusDiv.innerText = "📊 در حال استخراج نهایی فرکانس چگالی عبارات...";
        renderPerUrlPhraseTable(globalPerSourcePhrases, phraseResultsSection);
        
        statusDiv.innerText = "🚀 عملیات پردازش و بهینه‌سازی با موفقیت پایان یافت.";
        exportBtn.disabled = false; 
    } else {
        statusDiv.innerText = "❌ خطا: سیستم قادر به دریافت محتوای متنی از منابع ارسالی نبود.";
    }
    startBtn.disabled = false;
}

function processHtmlDocument(label, htmlContent, perSourcePhrases) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    const title = doc.querySelector('title')?.innerText.trim() || "";
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content')?.trim() || "";
    const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim()).filter(t => t !== "");
    const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim()).filter(t => t !== "");
    const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim()).filter(t => t !== "");
    const altTexts = Array.from(doc.querySelectorAll('img')).map(img => img.getAttribute('alt')).filter(alt => alt && alt.trim() !== "").map(alt => alt.trim());
    const anchorTexts = Array.from(doc.querySelectorAll('a')).map(el => el.innerText.trim()).filter(text => text !== "");

    const cleanDoc = doc.cloneNode(true);
    const elementsToRemove = cleanDoc.querySelectorAll('script, style, svg, path, iframe, nav, header, footer, noscript, link, head, dialog');
    elementsToRemove.forEach(el => el.remove());
    const pureBodyText = cleanDoc.body ? cleanDoc.body.innerText.replace(/\s+/g, ' ').trim() : "";

    // Structural character isolation block separation per page instance
    const combinedLinkElementsText = [
        title, metaDesc, h1s.join(" | "), h2s.join(" | "), 
        h3s.join(" | "), anchorTexts.join(" | "), altTexts.join(" | "), pureBodyText
    ].join(" | ");
    
    perSourcePhrases[label] = combinedLinkElementsText; 

    // FIXED: Save localized clean arrays right inside this page memory block
    parsedSourcesMemory.push({
        label, 
        title: title,
        metaDesc: metaDesc, 
        h1s: h1s, 
        h2s, h3s, altTexts, anchorTexts, pureBodyText, 
        error: false,
        // Lowercase isolated exact matching arrays unique to this source layout
        localTitleLower: title.toLowerCase(),
        localMetaDescLower: metaDesc.toLowerCase(),
        localH1sLower: h1s.map(h => h.toLowerCase())
    });
}

function renderMegaMatrixTable(container) {
    const sectionTitle = document.createElement('h2');
    sectionTitle.innerText = "ماتریس مقایسه ساختار سئوی ستونی رقبا";
    container.appendChild(sectionTitle);

    const topScrollbarContainer = document.createElement('div');
    topScrollbarContainer.className = 'top-scrollbar-container';
    const topScrollbarFakeContent = document.createElement('div');
    topScrollbarFakeContent.className = 'top-scrollbar-fake-content';
    topScrollbarContainer.appendChild(topScrollbarFakeContent);
    container.appendChild(topScrollbarContainer);

    const outerWrapper = document.createElement('div');
    outerWrapper.className = 'mega-table-wrapper';

    const calculatedColWidth = parsedSourcesMemory.length > 2 ? '400px' : '500px';

    let html = `<table><thead><tr><th class="feature-corner">پارامترهای ساختاری</th>`;
    
    parsedSourcesMemory.forEach(source => {
        const dynamicLink = source.label.startsWith('http') 
            ? `<a href="${source.label}" target="_blank" style="direction:ltr; display:block; font-size:0.8rem; color:var(--primary); font-weight:700; word-break:break-all;">🔗 ${source.label}</a>` 
            : `<span style="font-weight:700; color:var(--text-heading)">📄 ${source.label}</span>`;
        html += `<th class="source-column-header" style="width: ${calculatedColWidth};">${dynamicLink}</th>`;
    });
    html += `</tr></thead><tbody>`;

    const fields = [
        { id: 'title', label: 'Title (عنوان صفحه)' },
        { id: 'metaDesc', label: 'Meta Description' },
        { id: 'h1s', label: 'عناوین H1' },
        { id: 'h2s', label: 'عناوین H2' },
        { id: 'h3s', label: 'عناوین H3' },
        { id: 'anchors', label: 'متن انکرتکست‌ها (خط به خط)' },
        { id: 'alts', label: 'متن تصاویر (Alt)' },
        { id: 'body', label: 'متن استخراج‌شده از بدنه' }
    ];

    fields.forEach(field => {
        html += `<tr><td class="feature-label">${field.label}</td>`;
        
        parsedSourcesMemory.forEach(source => {
            if (source.error) {
                html += `<td style="color:var(--error); text-align:center; background-color:rgba(239,68,68,0.03); font-weight:600;">❌ عدم دسترسی یا انسداد توسط هاست</td>`;
                return;
            }

            html += `<td>`;
            switch(field.id) {
                case 'title':
                    html += `<span style="color:var(--text-heading); font-weight:700; font-size:0.95rem;">${source.title || 'موجود نیست'}</span>`;
                    break;
                case 'metaDesc':
                    html += `<span style="color:var(--text-body); font-size:0.9rem;">${source.metaDesc || 'موجود نیست'}</span>`;
                    break;
                case 'h1s':
                    html += source.h1s.length ? `<ul>${source.h1s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>';
                    break;
                case 'h2s':
                    html += source.h2s.length ? `<ul>${source.h2s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>';
                    break;
                case 'h3s':
                    html += source.h3s.length ? `<ul>${source.h3s.map(h => `<li>${h}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>';
                    break;
                case 'anchors':
                    html += source.anchorTexts.length 
                        ? `<div class="anchor-preview-box">${source.anchorTexts.map(text => `<div class="anchor-preview-line">🔗 <span>${text}</span></div>`).join('')}</div>` 
                        : '<span style="color:var(--text-muted)">یافت نشد</span>';
                    break;
                case 'alts':
                    html += source.altTexts.length ? `<ul>${source.altTexts.map(a => `<li>${a}</li>`).join('')}</ul>` : '<span style="color:var(--text-muted)">یافت نشد</span>';
                    break;
                case 'body':
                    const wordsArray = source.pureBodyText.split(' ').filter(w => w.length > 0);
                    const totalWordsCount = wordsArray.length;
                    const previewText = wordsArray.slice(0, 140).join(' ') + (totalWordsCount > 140 ? ' ...' : '');
                    
                    html += `
                        <div style="margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--accent-emerald); font-weight: bold; background-color: var(--accent-emerald-bg); display: inline-block; padding: 0.15rem 0.5rem; border-radius: var(--radius-sm);">
                            📊 تعداد کل کلمات متن خالص: ${totalWordsCount} کلمه
                        </div>
                        <div class="body-preview-box">${previewText || 'هیچ متنی استخراج نشد'}</div>
                    `;
                    break;
            }
            html += `</td>`;
        });
        html += `</tr>`;
    });

    html += `</tbody></table>`;
    outerWrapper.innerHTML = html;
    container.appendChild(outerWrapper);

    setTimeout(() => {
        const tableElement = outerWrapper.querySelector('table');
        if (tableElement) {
            topScrollbarFakeContent.style.width = tableElement.scrollWidth + 'px';
            
            let isSyncingTop = false;
            let isSyncingBottom = false;

            topScrollbarContainer.onscroll = function() {
                if (!isSyncingBottom) {
                    isSyncingTop = true;
                    outerWrapper.scrollLeft = topScrollbarContainer.scrollLeft;
                }
                isSyncingBottom = false;
            };

            outerWrapper.onscroll = function() {
                if (!isSyncingTop) {
                    isSyncingBottom = true;
                    topScrollbarContainer.scrollLeft = outerWrapper.scrollLeft;
                }
                isSyncingTop = false;
            };
        }
    }, 50);
}

function getTopPhrases(text, phraseLength, topCount = 10) {
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;
    const foundWords = text.match(persianRegex);
    if (!foundWords) return [];

    const words = foundWords.filter(word => {
        const cleanWord = word.trim();
        return cleanWord.length > 1 && !STOP_WORDS.includes(cleanWord);
    });

    const phraseCounts = {};
    for (let i = 0; i <= words.length - phraseLength; i++) {
        const phrase = words.slice(i, i + phraseLength).join(" ");
        phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
    }
    return Object.entries(phraseCounts).sort((a, b) => b[1] - a[1]).slice(0, topCount);
}

// FIXED: Receives specific source memory references to completely block multi-url data leakage
function generateSeoBadges(phrase, sourceObj) {
    if (!phrase || !sourceObj || sourceObj.error) return "";
    const lowerPhrase = phrase.toLowerCase().trim();
    
    const inTitle = sourceObj.localTitleLower ? sourceObj.localTitleLower.includes(lowerPhrase) : false;
    const inDesc  = sourceObj.localMetaDescLower ? sourceObj.localMetaDescLower.includes(lowerPhrase) : false;
    const inH1    = sourceObj.localH1sLower ? sourceObj.localH1sLower.some(h => h.includes(lowerPhrase)) : false;

    let badgesHtml = "";
    if (inTitle) badgesHtml += `<span class="seo-tag t" title="تکرار در تایتل صفحه">T</span>`;
    if (inH1)    badgesHtml += `<span class="seo-tag h1" title="تکرار در تگ H1">H1</span>`;
    if (inDesc)  badgesHtml += `<span class="seo-tag md" title="تکرار در دیسکریپشن">MD</span>`;
    
    return badgesHtml;
}

function formatTopTwelvePhrases(text, phraseLen, sourceObj) {
    const topTwelve = getTopPhrases(text, phraseLen, 12);
    if (topTwelve.length === 0) return '<span style="color:var(--text-muted)">یافت نشد</span>';
    
    return topTwelve.map(([phrase, count]) => `
        <div class="phrase-item">
            <div class="phrase-wrapper">
                <span class="phrase-text">${phrase}</span>
                ${generateSeoBadges(phrase, sourceObj)}
            </div>
            <span class="count-badge">${count} بار</span>
        </div>
    `).join('');
}

function renderPerUrlPhraseTable(perSourcePhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginTop = "2.5rem";
    div.innerHTML = `<h2>چگالی دوازده کلمه کلیدی برتر تفکیک‌شده</h2>`;
    
    let tableHtml = `
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="direction:ltr; text-align:left; width: 15%; background-color:#f1f5f9; font-weight:800;">منبع ورودی</th>
                        <th style="background-color:#f8fafc; font-weight:800;">عبارات ۲ کلمه‌ای</th>
                        <th style="background-color:#f1f5f9; font-weight:800;">عبارات ۳ کلمه‌ای</th>
                        <th style="background-color:#f8fafc; font-weight:800;">عبارات ۴ کلمه‌ای</th>
                        <th style="background-color:#f1f5f9; font-weight:800;">عبارات ۵ کلمه‌ای</th>
                    </tr>
                </thead>
                <tbody>
    `;

    for (const [sourceLabel, text] of Object.entries(perSourcePhrases)) {
        // Match current loop iteration label back to its clean isolated data source tracking container
        const associatedSourceObj = parsedSourcesMemory.find(src => src.label === sourceLabel);

        const cellP2 = formatTopTwelvePhrases(text, 2, associatedSourceObj);
        const cellP3 = formatTopTwelvePhrases(text, 3, associatedSourceObj);
        const cellP4 = formatTopTwelvePhrases(text, 4, associatedSourceObj);
        const cellP5 = formatTopTwelvePhrases(text, 5, associatedSourceObj);

        const isUrl = sourceLabel.startsWith('http');
        const stylizedLabel = isUrl 
            ? `<a href="${sourceLabel}" target="_blank" style="color:var(--primary); font-weight:600; text-decoration:none; display:block; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${sourceLabel}</a>` 
            : `<span style="font-weight:600; color:var(--text-heading);">${sourceLabel}</span>`;

        tableHtml += `
            <tr>
                <td style="direction:ltr; text-align:left; vertical-align:middle;">${stylizedLabel}</td>
                <td style="background-color: rgba(248,250,252,0.4);">${cellP2}</td>
                <td>${cellP3}</td>
                <td style="background-color: rgba(248,250,252,0.4);">${cellP4}</td>
                <td>${cellP5}</td>
            </tr>
        `;
    }

    tableHtml += `</tbody></table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}

function exportDataToExcel() {
    if (parsedSourcesMemory.length === 0) return;

    const workbook = XLSX.utils.book_new();

    const matrixRows = [];
    const matrixHeader = ["پارامترهای ساختاری"];
    parsedSourcesMemory.forEach(src => matrixHeader.push(src.label));
    matrixRows.push(matrixHeader);

    const fields = [
        { id: 'title', label: 'Title (عنوان صفحه)' },
        { id: 'metaDesc', label: 'Meta Description' },
        { id: 'h1s', label: 'عناوین H1' },
        { id: 'h2s', label: 'عناوین H2' },
        { id: 'h3s', label: 'عناوین H3' },
        { id: 'anchors', label: 'متن انکرتکست‌ها' },
        { id: 'alts', label: 'متن تصاویر (Alt)' },
        { id: 'body', label: 'تعداد کلمات خالص متن بدنه' }
    ];

    fields.forEach(field => {
        const row = [field.label];
        parsedSourcesMemory.forEach(source => {
            if (source.error) {
                row.push("❌ خطا در خزش منبع");
            } else {
                switch(field.id) {
                    case 'title': row.push(source.title || ''); break;
                    case 'metaDesc': row.push(source.metaDesc || ''); break;
                    case 'h1s': row.push(source.h1s.join(' | ')); break;
                    case 'h2s': row.push(source.h2s.join(' | ')); break;
                    case 'h3s': row.push(source.h3s.join(' | ')); break;
                    case 'anchors': row.push(source.anchorTexts.join(' | ')); break;
                    case 'alts': row.push(source.altTexts.join(' | ')); break;
                    case 'body': row.push(source.pureBodyText ? source.pureBodyText.split(' ').filter(w => w.length > 0).length + " کلمه" : '0'); break;
                }
            }
        });
        matrixRows.push(row);
    });

    const matrixSheet = XLSX.utils.aoa_to_sheet(matrixRows);
    XLSX.utils.book_append_sheet(workbook, matrixSheet, "SEO Matrix");

    const densityRows = [
        ["منبع ورودی", "نوع عبارت", "عبارت کلیدی استخراج شده", "تعداد تکرار (فرکانس)"]
    ];

    for (const [sourceLabel, text] of Object.entries(globalPerSourcePhrases)) {
        [2, 3, 4, 5].forEach(len => {
            const topPhrases = getTopPhrases(text, len, 12);
            topPhrases.forEach(([phrase, count]) => {
                densityRows.push([
                    sourceLabel,
                    `${len} کلمه‌ای`,
                    phrase,
                    count
                ]);
            });
        });
    }

    const densitySheet = XLSX.utils.aoa_to_sheet(densityRows);
    XLSX.utils.book_append_sheet(workbook, densitySheet, "Keyword Density");

    if (!workbook.Workbook) workbook.Workbook = {};
    if (!workbook.Workbook.Views) workbook.Workbook.Views = [{}];
    workbook.Workbook.Views[0].RTL = true;
    
    matrixSheet['!views'] = [{RTL: true}];
    densitySheet['!views'] = [{RTL: true}];

    XLSX.writeFile(workbook, `SEO-Analysis-Report-${new Date().toISOString().slice(0,10)}.xlsx`);
}
