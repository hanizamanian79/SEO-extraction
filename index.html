<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #09090b 0%, #18181b 100%);
            --card-bg: rgba(30, 41, 59, 0.35);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --primary: #f97316; 
            --primary-hover: #ea580c; 
            --accent: #eab308; 
            --error: #ef4444;
            --table-header: rgba(9, 9, 11, 0.8);
            --table-row-hover: rgba(255, 255, 255, 0.02);
            --input-focus-glow: rgba(249, 115, 22, 0.2);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 1rem;
            direction: rtl;
            min-height: 100vh;
            box-sizing: border-box;
        }

        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 0;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to left, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        h2 {
            font-size: 1.4rem;
            color: var(--text-main);
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            border-right: 4px solid var(--primary);
            padding-right: 0.5rem;
        }

        h3 {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 1rem;
        }

        h4 {
            font-size: 1rem;
            color: var(--accent); 
            margin-bottom: 0.75rem;
            font-weight: 700;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--card-border);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        input[type="url"], textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: #09090b;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="url"] { direction: ltr; }
        textarea { direction: ltr; font-family: monospace; height: 120px; resize: vertical; }

        input[type="url"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--input-focus-glow);
        }

        .btn-wrapper {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 200px;
            background-color: var(--primary);
            color: #000000; 
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
        }

        button.secondary {
            background-color: #27272a;
            color: var(--text-main);
            box-shadow: none;
            border: 1px solid var(--card-border);
        }

        button:hover { 
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        button.secondary:hover { background-color: #3f3f46; color: #ffffff; }
        
        button:disabled { 
            background-color: #27272a; 
            color: #71717a;
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }

        .status {
            font-weight: 500;
            margin-top: 1.25rem;
            color: var(--accent);
            text-align: center;
            font-size: 0.95rem;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin: 1rem 0;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #18181b;
            font-size: 0.9rem;
            min-width: 700px; /* Increased slightly to accommodate double phrases cleanly */
        }

        th, td {
            padding: 0.9rem 1.2rem;
            text-align: right;
            border-bottom: 1px solid var(--card-border);
            line-height: 1.5;
            vertical-align: top;
        }

        th {
            background-color: var(--table-header);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--table-row-hover); }
        ul { margin: 0; padding-right: 1.2rem; padding-left: 0; }
        li { margin-bottom: 0.25rem; }
        
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--accent); text-decoration: underline; }

        .flex-tables {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .phrase-item {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: var(--accent);
        }
        .phrase-item:last-child {
            margin-bottom: 0;
        }
        .count-badge {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.06);
            padding: 1px 5px;
            border-radius: 4px;
            margin-right: 4px;
            display: inline-block;
        }

        @media (min-width: 768px) {
            .flex-tables { grid-template-columns: repeat(2, 1fr); }
        }

        .error-msg {
            color: var(--error);
            font-size: 0.9rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>استخراج‌گر سئو و تحلیل‌گر عبارات فارسی</h1>
    
    <!-- Unified Input Dashboard -->
    <div class="card">
        <h3>روش اول: استخراج خودکار از طریق آدرس (مستعد مسدودسازی فایروال)</h3>
        <div class="input-group">
            <input type="url" class="url-input" placeholder="https://example.com" value="https://kayhanravan.ir/arshad/clinical-general-psychology/">
            <input type="url" class="url-input" placeholder="https://another-example.com">
            <input type="url" class="url-input" placeholder="">
        </div>

        <h3 style="margin-top: 1.5rem;">روش دوم: مسیر میانبر فایروال (کد منبع سورس HTML سایت مسدود شده را اینجا پیست کنید)</h3>
        <div class="input-group">
            <textarea id="raw-html-input" placeholder="کد منبع (Source HTML) کپی شده را اینجا پیست کنید..."></textarea>
        </div>

        <div class="btn-wrapper">
            <button id="start-btn" onclick="startExtracting(false)">شروع استخراج از لینک‌ها</button>
            <button id="bypass-btn" class="secondary" onclick="startExtracting(true)">تحلیل دستی کد HTML پیست شده</button>
        </div>
        <div id="status-output" class="status"></div>
    </div>

    <div id="url-results-section"></div>
    <div id="phrase-results-section"></div>
</div>

<script>
async function fetchWithProxyFallback(targetUrl, statusDiv) {
    const encodedUrl = encodeURIComponent(targetUrl);
    const proxies = [
        { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodedUrl}`, type: "text" },
        { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodedUrl}`, type: "text" },
        { name: "CodeTabs Proxy", url: `https://api.codetabs.com/v1/proxy?quest=${targetUrl}`, type: "text" },
        { name: "AllOrigins (JSON Wrapped)", url: `https://api.allorigins.win/get?url=${encodedUrl}`, type: "json" }
    ];

    for (let i = 0; i < proxies.length; i++) {
        const proxy = proxies[i];
        statusDiv.innerText = `در حال تلاش از طریق سرور کمکی ${i + 1} (${proxy.name})...`;
        
        try {
            const response = await fetch(proxy.url);
            if (!response.ok) throw new Error("Blocked");
            if (proxy.type === "json") {
                const json = await response.json();
                if (json.contents) return json.contents;
            } else {
                const text = await response.text();
                if (text && text.trim().length > 200) return text;
            }
        } catch (e) {
            console.warn(`${proxy.name} bypassed/blocked.`);
        }
    }
    throw new Error("Blocked");
}

async function startExtracting(isManualBypass = false) {
    const inputs = document.querySelectorAll('.url-input');
    const rawHtmlData = document.getElementById('raw-html-input').value.trim();
    const startBtn = document.getElementById('start-btn');
    const bypassBtn = document.getElementById('bypass-btn');
    const statusDiv = document.getElementById('status-output');
    const urlResultsSection = document.getElementById('url-results-section');
    const phraseResultsSection = document.getElementById('phrase-results-section');
    
    urlResultsSection.innerHTML = "<h2>جزئیات سئو هر آدرس</h2>";
    phraseResultsSection.innerHTML = "<h2>تحلیل عبارات تکراری فارسی</h2>";
    
    let allExtractedTexts = [];
    let perUrlPhrases = {}; 

    startBtn.disabled = true;
    bypassBtn.disabled = true;

    if (isManualBypass) {
        if (!rawHtmlData) {
            alert("لطفاً ابتدا کدهای اچ‌تی‌ام‌ال را در باکس متنی پیست کنید.");
            startBtn.disabled = false;
            bypassBtn.disabled = false;
            return;
        }
        statusDiv.innerText = "در حال تحلیل اطلاعات سورس پیست شده...";
        processHtmlDocument("اطلاعات پیست شده دستی (Manual Source)", rawHtmlData, allExtractedTexts, perUrlPhrases, urlResultsSection);
    } else {
        const urls = Array.from(inputs).map(i => i.value.trim()).filter(url => url !== "");
        if (urls.length === 0) {
            alert("لطفاً حداقل یک آدرس معتبر وارد کنید.");
            startBtn.disabled = false;
            bypassBtn.disabled = false;
            return;
        }

        for (let url of urls) {
            try {
                const htmlText = await fetchWithProxyFallback(url, statusDiv);
                processHtmlDocument(url, htmlText, allExtractedTexts, perUrlPhrases, urlResultsSection);
            } catch (error) {
                renderErrorTable(url, urlResultsSection);
            }
        }
    }

    if (allExtractedTexts.length > 0) {
        statusDiv.innerText = "در حال تحلیل و استخراج کلمات فارسی...";
        const combinedGlobalText = allExtractedTexts.join(" ");
        renderGlobalPhraseTables(combinedGlobalText, phraseResultsSection);
        renderPerUrlPhraseTable(perUrlPhrases, phraseResultsSection);
        statusDiv.innerText = "عملیات با موفقیت پایان یافت!";
    } else {
        statusDiv.innerText = "هیچ داده‌ای برای پردازش یافت نشد.";
    }
    
    startBtn.disabled = false;
    bypassBtn.disabled = false;
}

function processHtmlDocument(label, htmlContent, allExtractedTexts, perUrlPhrases, container) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlContent, "text/html");

    const title = doc.querySelector('title')?.innerText || "N/A";
    const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || "N/A";
    
    const h1s = Array.from(doc.querySelectorAll('h1')).map(el => el.innerText.trim());
    const h2s = Array.from(doc.querySelectorAll('h2')).map(el => el.innerText.trim());
    const h3s = Array.from(doc.querySelectorAll('h3')).map(el => el.innerText.trim());

    const bodyText = doc.body ? doc.body.innerText : "";
    const altTexts = Array.from(doc.querySelectorAll('img')).map(img => img.getAttribute('alt')).filter(alt => alt && alt.trim() !== "").map(alt => alt.trim());
    
    const combinedContentText = bodyText + " " + altTexts.join(" ");
    allExtractedTexts.push(combinedContentText);
    perUrlPhrases[label] = combinedContentText;

    renderUrlTable(label, title, metaDesc, h1s, h2s, h3s, altTexts, container);
}

function renderUrlTable(url, title, desc, h1s, h2s, h3s, altTexts, container) {
    const card = document.createElement('div');
    card.className = 'card';
    const dynamicLink = url.startsWith('http') ? `<a href="${url}" target="_blank" style="direction:ltr; display:inline-block;">${url}</a>` : url;
    card.innerHTML = `
        <h3>اطلاعات سایت: ${dynamicLink}</h3>
        <div class="table-responsive">
            <table>
                <tr><th style="width: 25%">آیتم سئو</th><th>محتوای استخراج شده</th></tr>
                <tr><td><strong>Title (عنوان صفحه)</strong></td><td>${title}</td></tr>
                <tr><td><strong>Meta Description (توضیحات)</strong></td><td>${desc}</td></tr>
                <tr><td><strong>تگ‌های H1</strong></td><td>${h1s.length ? `<ul>${h1s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
                <tr><td><strong>تگ‌های H2</strong></td><td>${h2s.length ? `<ul>${h2s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
                <tr><td><strong>تگ‌های H3</strong></td><td>${h3s.length ? `<ul>${h3s.map(h => `<li>${h}</li>`).join('')}</ul>` : 'یافت نشد'}</td></tr>
                <tr><td><strong>متن‌های جایگزین تصویر (Alt Text)</strong></td><td>${altTexts.length ? `<ul>${altTexts.map(a => `<li>${a}</li>`).join('')}</ul>` : 'هیچ ویژگی Alt یافت نشد'}</td></tr>
            </table>
        </div>
    `;
    container.appendChild(card);
}

function renderErrorTable(url, container) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <h3>خطا در آدرس: <a href="${url}" target="_blank" style="direction:ltr; display:inline-block;">${url}</a></h3>
        <p class="error-msg">سیستم‌های امنیتی فایروال این وب‌سایت مانع از دسترسی سرورهای واسطه شدند. لطفاً از باکس متنی زیر (روش دوم) برای تحلیل کد منبع این صفحه استفاده کنید.</p>
    `;
    container.appendChild(card);
}

function getTopPhrases(text, phraseLength, topCount = 10) {
    const persianRegex = /[\u0600-\u06FF\uFB8A\u067E\u0686\u06AF\u200C]+/g;
    const foundWords = text.match(persianRegex);
    if (!foundWords) return [];

    const stopWords = ['از', 'به', 'که', 'در', 'با', 'تا', 'را', 'این', 'آن', 'است', 'برای', 'می', 'شور', 'شد', 'شود', 'هم', 'یک', 'یا', 'ها', 'دارد', 'دهند', 'کنند', 'ال', 'های'];
    const words = foundWords.filter(word => !stopWords.includes(word) && word.length > 1);

    const phraseCounts = {};
    for (let i = 0; i <= words.length - phraseLength; i++) {
        const phrase = words.slice(i, i + phraseLength).join(" ");
        phraseCounts[phrase] = (phraseCounts[phrase] || 0) + 1;
    }

    return Object.entries(phraseCounts).sort((a, b) => b[1] - a[1]).slice(0, topCount);
}

function renderGlobalPhraseTables(globalText, container) {
    const flexContainer = document.createElement('div');
    flexContainer.className = 'flex-tables';
    
    for (let len = 2; len <= 5; len++) {
        const topPhrases = getTopPhrases(globalText, len, 10);
        const div = document.createElement('div');
        div.className = 'card';
        div.style.marginBottom = '0';
        div.innerHTML = `
            <h4>برترین عبارات ${len} کلمه‌ای (شامل متن تصاویر)</h4>
            <div class="table-responsive">
                <table>
                    <tr><th>عبارت فارسی</th><th style="width: 30%">تعداد تکرار</th></tr>
                    ${topPhrases.map(([phrase, count]) => `<tr><td><strong>${phrase}</strong></td><td><span style="color:var(--accent); font-weight:700;">${count}</span></td></tr>`).join('')}
                </table>
            </div>
        `;
        flexContainer.appendChild(div);
    }
    container.appendChild(flexContainer);
}

// Generates the collection of top 2 elements paired with count metadata
function formatTopTwoPhrases(text, phraseLen) {
    const topTwo = getTopPhrases(text, phraseLen, 2);
    if (topTwo.length === 0) return 'یافت نشد';
    
    return topTwo.map(([phrase, count]) => `
        <span class="phrase-item">
            ${phrase} <span class="count-badge">${count} بار</span>
        </span>
    `).join('');
}

function renderPerUrlPhraseTable(perUrlPhrases, container) {
    const div = document.createElement('div');
    div.className = 'card';
    div.style.marginTop = '2rem';
    div.innerHTML = `<h3>جدول ۴.۵: ۲ عبارت برتر و پر تکرار به تفکیک منابع ورودی</h3>`;
    
    let tableHtml = `
        <div class="table-responsive">
            <table>
                <tr>
                    <th style="direction:ltr; text-align:left; min-width:220px; max-width: 300px; overflow: hidden;">منبع (URL / Manual)</th>
                    <th>۲ عبارت برتر ۲ کلمه‌ای</th>
                    <th>۲ عبارت برتر ۳ کلمه‌ای</th>
                    <th>۲ عبارت برتر ۴ کلمه‌ای</th>
                    <th>۲ عبارت برتر ۵ کلمه‌ای</th>
                </tr>
    `;

    for (const [url, text] of Object.entries(perUrlPhrases)) {
        const cellP2 = formatTopTwoPhrases(text, 2);
        const cellP3 = formatTopTwoPhrases(text, 3);
        const cellP4 = formatTopTwoPhrases(text, 4);
        const cellP5 = formatTopTwoPhrases(text, 5);

        tableHtml += `
            <tr>
                <td style="direction:ltr; text-align:left; word-break: break-all;"><small>${url}</small></td>
                <td>${cellP2}</td>
                <td>${cellP3}</td>
                <td>${cellP4}</td>
                <td>${cellP5}</td>
            </tr>
        `;
    }

    tableHtml += `</table></div>`;
    div.innerHTML += tableHtml;
    container.appendChild(div);
}
</script>
</body>
</html>
